<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Syllabus & Course Matrix — Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient {
            background: linear-gradient(-45deg, #0f172a, #0f1e3d, #1a103c, #020617);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
    </style>
</head>
<body class="animate-gradient font-sans min-h-screen text-slate-200 flex flex-col justify-between">

    <header class="w-full bg-slate-950/60 backdrop-blur-md border-b border-white/5 py-4 px-6 flex items-center justify-between shadow-lg shrink-0 sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <a href="index.html" class="bg-white/5 hover:bg-white/10 border border-white/10 p-2 rounded-xl transition text-slate-400 hover:text-white mr-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
            </a>
            <div class="flex items-center space-x-2">
                <img src="logo.png" alt="Logo" class="h-8 w-auto object-contain bg-white/95 p-1 rounded-xl">
                <div class="flex flex-col hidden sm:flex">
                    <span class="text-xs font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 uppercase leading-none">EXAM PORTAL</span>
                    <span class="text-[8px] font-mono font-bold text-slate-500 tracking-wider mt-0.5 uppercase">Syllabus Node</span>
                </div>
            </div>
        </div>
        
        <h2 id="category-title-header" class="text-sm font-black tracking-wider text-slate-200 uppercase truncate max-w-xs hidden md:block">
            Loading Domain Matrix...
        </h2>

        <div class="flex items-center space-x-4">
            <a href="index.html" class="bg-gradient-to-r from-blue-600/20 to-indigo-600/20 hover:from-blue-600/30 hover:to-indigo-600/30 border border-blue-500/30 text-[10px] font-mono font-black py-2 px-4 rounded-xl transition uppercase tracking-wider text-blue-400">
                &larr; Exit Cluster
            </a>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-8 space-y-6">
        
        <div class="bg-slate-900/40 backdrop-blur-xl border border-white/5 p-6 rounded-3xl space-y-2 relative overflow-hidden shadow-2xl">
            <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            <span class="text-[9px] font-mono font-black text-blue-400 bg-blue-500/10 px-2.5 py-1 rounded-md uppercase tracking-widest">ACTIVE VALIDATION CORE</span>
            <h1 id="main-category-title" class="text-2xl sm:text-3xl font-black text-white tracking-wide uppercase pt-1">Loading Exam Node...</h1>
            <p id="main-category-desc" class="text-xs sm:text-sm text-slate-400 font-medium">Resolving relational descriptions from backend database servers...</p>
        </div>

        <div class="bg-slate-950/40 backdrop-blur-xl border border-white/5 rounded-3xl p-6 sm:p-8 space-y-4 shadow-2xl">
            <h3 class="text-xs font-mono font-black text-purple-400 uppercase tracking-widest flex items-center space-x-2 border-b border-white/5 pb-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A2.25 2.25 0 0 0 5.969 19.5h12.062a2.25 2.25 0 0 0 2.2-3.006 60.423 60.423 0 0 0-.491-6.347m-15.482 0a44.69 44.69 0 0 1 15.482 0m-15.482 0 4.97-4.97m10.512 4.97-4.97-4.97M10.5 6.75h3" /></svg>
                <span>Available Examination Papers & Tests</span>
            </h3>
            <div id="tests-content-area" class="space-y-3 pt-1">
                <div class="space-y-3 animate-pulse py-4">
                    <div class="h-10 bg-white/5 rounded-xl w-full"></div>
                    <div class="h-10 bg-white/5 rounded-xl w-full"></div>
                </div>
            </div>
        </div>

    </main>

    <footer class="w-full text-center py-4 border-t border-white/5 bg-slate-950/40 backdrop-blur-sm text-[10px] font-mono font-bold text-slate-600 uppercase tracking-widest shrink-0">
        &copy; JECRC University — Examination Content Management Cluster Node
    </footer>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = function() {
            const sessionActive = localStorage.getItem('userEmail');
            if(!sessionActive) {
                window.location.replace("index.html");
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const categoryId = urlParams.get('category_id');

            if(!categoryId) {
                alert("Missing structural identifier.");
                window.location.replace("index.html");
                return;
            }

            loadCategoryAndExams(categoryId);
        };

        // 🔄 FETCH CATEGORY METADATA AND MAP TO EXISTING EXAMS TABLE
        async function loadCategoryAndExams(catId) {
            try {
                // 1. Fetch parent category layout info
                const { data: category, error: catError } = await supabaseClient
                    .from('exam_categories')
                    .select('*')
                    .eq('id', catId)
                    .maybeSingle();

                if (catError || !category) throw new Error("Category record missing.");

                document.getElementById('category-title-header').innerText = category.category_name;
                document.getElementById('main-category-title').innerText = category.category_name;
                document.getElementById('main-category-desc').innerText = category.description || "Active database stream sync.";

                // 2. Fetch direct logs from your original 'exams' table matching the dynamic column
                // Agar aapki purani table ka naam 'exams' hai, toh yeh query usse directly map karegi
                const { data: exams, error: examError } = await supabaseClient
                    .from('exams') // 👈 Swapped table name dynamically back to original 'exams'
                    .select('*');

                const testsArea = document.getElementById('tests-content-area');
                
                if(examError) {
                    // Feedback layer in case column parameters mismatch
                    testsArea.innerHTML = `<div class="text-xs font-mono text-red-400 p-2">Database mapping mismatch or table missing.</div>`;
                    return;
                }

                if(exams && exams.length > 0) {
                    testsArea.innerHTML = "";
                    exams.forEach(ex => {
                        // Dynamic checking of table columns: mapping title/name and url/link securely
                        const examTitle = ex.exam_name || ex.title || ex.test_title || "Unnamed Exam Node";
                        const examUrl = ex.exam_url || ex.url || ex.test_url || "#";

                        testsArea.innerHTML += `
                            <div onclick="window.open('${examUrl}', '_blank')" class="flex justify-between items-center bg-slate-900/60 p-4 rounded-xl border border-white/5 hover:border-purple-500/30 hover:bg-slate-900/80 transition cursor-pointer group">
                                <div class="flex items-center space-x-3">
                                    <div class="bg-purple-500/10 text-purple-400 group-hover:bg-purple-500/20 p-2 rounded-lg text-xs font-mono font-bold transition">LIVE</div>
                                    <span class="text-xs font-bold text-slate-200 uppercase tracking-wide group-hover:text-purple-400 transition">${examTitle}</span>
                                </div>
                                <button class="bg-purple-600 group-hover:bg-purple-500 text-white text-[10px] font-mono font-black py-2 px-4 rounded-xl transition uppercase tracking-wider shadow-lg shadow-purple-600/10 pointer-events-none">Start Exam &rarr;</button>
                            </div>`;
                    });
                } else {
                    testsArea.innerHTML = `<div class="text-xs font-mono text-slate-600 uppercase py-2">No dynamic data rows mapped inside the 'exams' table cluster.</div>`;
                }

            } catch (err) {
                document.getElementById('tests-content-area').innerHTML = `
                    <div class="text-red-400 font-mono text-xs text-center py-4">Core pipeline intersection fault.</div>`;
            }
        }
    </script>
</body>
</html>
