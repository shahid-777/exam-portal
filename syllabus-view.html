
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Syllabus & Course Matrix — Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient {
            background: linear-gradient(-45deg, #0f172a, #0f1e3d, #1a103c, #020617);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
    </style>
</head>
<body class="animate-gradient font-sans min-h-screen text-slate-200 flex flex-col justify-between">

    <header class="w-full bg-slate-950/60 backdrop-blur-md border-b border-white/5 py-4 px-6 flex items-center justify-between shadow-lg shrink-0 sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <a href="index.html" class="bg-white/5 hover:bg-white/10 border border-white/10 p-2 rounded-xl transition text-slate-400 hover:text-white mr-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
            </a>
            <div class="flex items-center space-x-2">
                <img src="logo.png" alt="Logo" class="h-8 w-auto object-contain bg-white/95 p-1 rounded-xl">
                <div class="flex flex-col hidden sm:flex">
                    <span class="text-xs font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 uppercase leading-none">EXAM PORTAL</span>
                    <span class="text-[8px] font-mono font-bold text-slate-500 tracking-wider mt-0.5 uppercase">Syllabus Node</span>
                </div>
            </div>
        </div>
        
        <h2 id="category-title-header" class="text-sm font-black tracking-wider text-slate-200 uppercase truncate max-w-xs hidden md:block">
            Loading Domain Matrix...
        </h2>

        <div class="flex items-center space-x-4">
            <a href="index.html" class="bg-gradient-to-r from-blue-600/20 to-indigo-600/20 hover:from-blue-600/30 hover:to-indigo-600/30 border border-blue-500/30 text-[10px] font-mono font-black py-2 px-4 rounded-xl transition uppercase tracking-wider text-blue-400">
                &larr; Exit Cluster
            </a>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-8 space-y-6">
        
        <div class="bg-slate-900/40 backdrop-blur-xl border border-white/5 p-6 rounded-3xl space-y-2 relative overflow-hidden shadow-2xl">
            <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-blue-500 to-indigo-600"></div>
            <span class="text-[9px] font-mono font-black text-blue-400 bg-blue-500/10 px-2.5 py-1 rounded-md uppercase tracking-widest">ACTIVE VALIDATION CORE</span>
            <h1 id="main-category-title" class="text-2xl sm:text-3xl font-black text-white tracking-wide uppercase pt-1">Loading Exam Node...</h1>
            <p id="main-category-desc" class="text-xs sm:text-sm text-slate-400 font-medium">Resolving relational descriptions from backend database servers...</p>
        </div>

        <div class="bg-slate-950/40 backdrop-blur-xl border border-white/5 rounded-3xl p-6 sm:p-8 space-y-6 shadow-2xl min-h-[300px] relative">
            <div class="flex items-center justify-between border-b border-white/5 pb-4">
                <h3 class="text-xs font-mono font-black text-slate-400 uppercase tracking-widest flex items-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-indigo-400"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.03 0 1.9.693 2.166 1.638m-7.377 2.24a4.854 4.854 0 0 1 7.377 0M4.5 19.5h15" /></svg>
                    <span>Official Syllabus Blueprint & Core Metrics</span>
                </h3>
            </div>

            <div id="syllabus-content-area" class="text-sm text-slate-300 leading-relaxed space-y-4 font-normal">
                <div class="space-y-3 animate-pulse py-4">
                    <div class="h-4 bg-white/5 rounded-md w-3/4"></div>
                    <div class="h-4 bg-white/5 rounded-md w-5/6"></div>
                    <div class="h-4 bg-white/5 rounded-md w-1/2"></div>
                </div>
            </div>
        </div>

    </main>

    <footer class="w-full text-center py-4 border-t border-white/5 bg-slate-950/40 backdrop-blur-sm text-[10px] font-mono font-bold text-slate-600 uppercase tracking-widest shrink-0">
        &copy; JECRC University — Examination Content Management Cluster Node
    </footer>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = function() {
            // Secure Validation Shield Check
            const sessionActive = localStorage.getItem('userEmail');
            if(!sessionActive) {
                window.location.replace("index.html");
                return;
            }

            // Extract Target Category ID Parameter directly via URL string parsing
            const urlParams = new URLSearchParams(window.location.search);
            const categoryId = urlParams.get('category_id');

            if(!categoryId) {
                alert("Matrix reference exception: Missing structural identifier.");
                window.location.replace("index.html");
                return;
            }

            loadCategoryDetails(categoryId);
        };

        // 🔄 RETRIEVE EXAM CONTENT SCHEMA MATRICES VIA DATA PIPELINE
        async function loadCategoryDetails(catId) {
            try {
                // Fetch direct text data rows matching column mapping criteria 
                const { data: category, error } = await supabaseClient
                    .from('exam_categories')
                    .select('*')
                    .eq('id', catId)
                    .maybeSingle();

                if (error || !category) {
                    throw new Error("Target record not mapped.");
                }

                // Update Header and Branding Nodes
                document.getElementById('category-title-header').innerText = category.category_name;
                document.getElementById('main-category-title').innerText = category.category_name;
                document.getElementById('main-category-desc').innerText = category.description || "Official syllabus metrics tracking active.";

                // 💡 SYLLABUS CONTENT LOGIC PARSER
                // Agar aapne table mein extra schema save kiya hai toh use dynamically layout par replace karein:
                if (category.syllabus_html_content) {
                    document.getElementById('syllabus-content-area').innerHTML = category.syllabus_html_content;
                } else {
                    document.getElementById('syllabus-content-area').innerHTML = `
                        <div class="border border-white/5 bg-white/5 p-6 rounded-2xl text-center text-xs font-mono text-slate-400 uppercase tracking-wide">
                            Syllabus content streams currently unprovisioned for this domain.<br>
                            <span class="text-[10px] text-slate-500 mt-1 block">Deploy resources manually via Administrator Panel node terminal.</span>
                        </div>`;
                }

            } catch (err) {
                document.getElementById('syllabus-content-area').innerHTML = `
                    <div class="text-red-400 font-mono text-xs border border-red-500/10 p-4 rounded-xl bg-red-500/5 text-center">
                        Core interface connectivity failure while mapping data segments.
                    </div>`;
            }
        }
    </script>
</body>
</html>
