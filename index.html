<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Online Exam Portal - Gateway Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* 🎨 DYNAMIC BACKGROUND GRADIENT ANIMATION KEYFRAMES */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
    </style>
</head>
<body class="animate-gradient font-sans min-h-screen flex flex-col justify-between text-slate-200 overflow-x-hidden">

    <header class="w-full bg-slate-950/40 backdrop-blur-md border-b border-white/5 py-4 px-4 sm:px-6 flex items-center justify-between shadow-lg shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-white/95 p-1 rounded-xl shadow-inner shadow-black/20 shrink-0">
                <img src="logo.png" alt="Logo" class="h-7 sm:h-8 w-auto object-contain">
            </div>
            <div class="flex flex-col">
                <span class="text-xs sm:text-sm font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 uppercase leading-none">EXAM PORTAL</span>
                <span class="text-[8px] sm:text-[9px] font-mono font-bold text-slate-500 tracking-wider mt-0.5 uppercase">Computer Science Dept</span>
            </div>
        </div>
        <div class="bg-emerald-500/10 border border-emerald-500/20 px-2.5 sm:px-3 py-1 sm:py-1.5 rounded-full flex items-center space-x-1.5 sm:space-x-2 shadow-sm shadow-emerald-500/5">
            <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 bg-emerald-400 rounded-full animate-ping"></span>
            <span class="text-[8px] sm:text-[10px] font-mono font-black text-emerald-400 tracking-wider uppercase">SECURE NODE ACTIVE</span>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4 sm:p-6 w-full max-w-md mx-auto">
        <div class="bg-slate-900/60 backdrop-blur-xl w-full p-6 sm:p-8 rounded-3xl shadow-2xl border border-white/10 space-y-6 relative overflow-hidden">
            
            <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600"></div>

            <div class="space-y-2 text-center">
                <h2 class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-100 to-blue-400 uppercase tracking-wide">
                    ONLINE EXAM PORTAL
                </h2>
                <p class="text-[11px] sm:text-xs text-slate-400 font-medium leading-relaxed">
                    Sign in using your student corporate identity or email configurations.
                </p>
            </div>

            <div class="space-y-4 pt-1">
                <div>
                    <label class="block text-[10px] font-mono font-black text-slate-400 uppercase tracking-wider mb-1.5">
                        Email Address
                    </label>
                    <input type="email" id="user-email" placeholder="student@gmail.com" autocomplete="off" class="w-full border border-white/10 p-3 text-sm rounded-xl font-semibold bg-slate-950/50 text-white outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/10 transition shadow-inner">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-[10px] font-mono font-black text-slate-400 uppercase tracking-wider">
                            Password
                        </label>
                        <a href="forgot-password.html" class="text-[10px] font-bold text-blue-400 hover:text-blue-300 hover:underline transition">Forgot?</a>
                    </div>
                    <input type="password" id="user-password" placeholder="••••••••" class="w-full border border-white/10 p-3 text-sm rounded-xl font-semibold bg-slate-950/50 text-white outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/10 transition shadow-inner">
                </div>

                <button onclick="handleEmailPasswordAuthentication()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3.5 px-4 rounded-xl shadow-lg shadow-blue-600/20 uppercase text-xs tracking-wider transition transform active:scale-[0.99] mt-2 cursor-pointer">
                    SIGN IN / REGISTER
                </button>
            </div>

            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-white/5"></div>
                <span class="flex-shrink mx-4 text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest">OR</span>
                <div class="flex-grow border-t border-white/5"></div>
            </div>

            <div class="space-y-3">
                <div class="flex justify-center transition hover:scale-[1.01] w-full max-w-full overflow-hidden">
                    <div id="google-auth-element-root" class="w-full flex justify-center"></div>
                </div>
            </div>

            <div class="text-center pt-2 border-t border-white/5">
                <a href="admin-login.html" class="text-[10px] font-mono text-slate-500 hover:text-blue-400 tracking-widest uppercase transition font-bold">
                    &rarr; Admin Terminal Access
                </a>
            </div>

            <p class="text-[9px] font-mono text-center text-slate-600 font-bold uppercase tracking-wider">
                Real-time multi-user student verification cluster.
            </p>
        </div>
    </main>

    <footer class="w-full text-center py-3 border-t border-white/5 bg-slate-950/20 text-[9px] sm:text-[10px] font-mono font-bold text-slate-600 uppercase tracking-widest shrink-0">
        &copy; JECRC University — Computer Science Management System Terminal
    </footer>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = function () {
            localStorage.clear();

            // 🤖 INITIALIZE GOOGLE AUTH ENGINE FOR STUDENTS WITH POPUP PROTECT OVERRIDES
            google.accounts.id.initialize({
                client_id: "313377576458-c198ssj598dcg6c58c3kmtvtg5sf9m84.apps.googleusercontent.com", 
                callback: handleGoogleAuthCallbackResponse,
                auto_select: false
            });

            // Auto render mobile responsive widths configuration button structure matrix
            const containerWidth = document.getElementById("google-auth-element-root").offsetWidth || 320;
            const buttonWidth = Math.min(containerWidth, 320);

            google.accounts.id.renderButton(
                document.getElementById("google-auth-element-root"),
                { 
                    theme: "filled_blue", 
                    size: "large", 
                    type: "standard", 
                    text: "continue_with", 
                    width: buttonWidth.toString(),
                    shape: "pill"
                }
            );
        };

        // 🛡️ GOOGLE SECURE INTEGRATION METADATA RESOLVER CALLBACK
        async function handleGoogleAuthCallbackResponse(response) {
            try {
                const idToken = response.credential;
                const base64Url = idToken.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                const payloadObj = JSON.parse(jsonPayload);
                const googleEmail = payloadObj.email;
                const googleName = payloadObj.name || googleEmail.split('@')[0];

                const { data: userRow, error: fetchErr } = await supabaseClient
                    .from('portal_users')
                    .select('email, name')
                    .eq('email', googleEmail.toLowerCase())
                    .maybeSingle();

                if (!userRow) {
                    await supabaseClient.from('portal_users').insert({
                        email: googleEmail.toLowerCase(),
                        name: googleName,
                        password: "GoogleAuthenticatedAccount"
                    });
                }

                localStorage.setItem('userEmail', googleEmail.toLowerCase());
                localStorage.setItem('userName', googleName);
                localStorage.setItem('sessionLoginTime', Date.now().toString());

                window.location.replace("dashboard.html");

            } catch (err) {
                alert("Identity verification session mapping exception.");
            }
        }

        // 📧 MANUAL PLAIN-TEXT SYSTEM AUTH MODULE WITH STRING SANITIZATION MAPPINGS
        async function handleEmailPasswordAuthentication() {
            const inputEmail = document.getElementById('user-email').value.trim();
            const inputPassword = document.getElementById('user-password').value;

            if (!inputEmail || !inputPassword) { alert("Fields supplied mismatch criteria."); return; }

            try {
                const { data, error } = await supabaseClient
                    .from('portal_users')
                    .select('email, password, name')
                    .eq('email', inputEmail.toLowerCase())
                    .maybeSingle();

                if (error || !data || data.password !== inputPassword) {
                    alert("Authentication Error: Signature tokens match rejected.");
                    return;
                }

                const OFFICIAL_ADMIN_EMAIL = "examportalcse@gmail.com";
                if(data.email.toLowerCase() === OFFICIAL_ADMIN_EMAIL.toLowerCase()) {
                    localStorage.setItem('adminEmail', data.email.toLowerCase());
                    localStorage.setItem('adminSessionTime', Date.now().toString());
                    window.location.replace("admin.html");
                    return;
                }

                localStorage.setItem('userEmail', data.email.toLowerCase());
                localStorage.setItem('userName', data.name);
                localStorage.setItem('sessionLoginTime', Date.now().toString());

                window.location.replace("dashboard.html");

            } catch (err) {
                alert("Core database synchronization interface interruption.");
            }
        }
    </script>
</body>
</html>
