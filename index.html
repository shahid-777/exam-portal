<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam Portal - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen font-sans px-4 sm:px-6 lg:px-8">
    <!-- Full Width Responsive Top Navigation Bar -->
<header class="w-full bg-slate-900/90 backdrop-blur border-b border-slate-800/80 fixed top-0 left-0 z-50 px-4 sm:px-8 py-3.5 flex items-center justify-between shadow-lg">
    
    <!-- Left Section: Logo & University Branding Matrix -->
    <div class="flex items-center space-x-3.5">
        <div class="bg-white p-1 rounded-lg shadow-inner flex items-center justify-center">
            <img src="logo.png" alt="Logo" class="h-9 w-auto object-contain fallback-logo">
        </div>
        <div class="flex flex-col justify-center">
            <span class="text-sm font-black text-red-500 tracking-wider uppercase leading-none mb-0.5">JECRC</span>
            <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase font-mono leading-none">Exam Portal</span>
        </div>
    </div>

    <!-- Right Section: Live Micro-Cluster Node Security Status -->
    <div class="flex items-center space-x-2 bg-slate-950/80 px-3 py-1.5 rounded-xl border border-emerald-500/20 shadow-md">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        <span class="text-[9px] font-mono text-emerald-400 font-bold uppercase tracking-widest">Secure Node Active</span>
    </div>

</header>

<!-- ⚠️ IMPORTANT: Form wale container block par 'pt-24' (Padding-Top) class jodna mat bhoolna taaki header form ko chhupaye nahi! -->
    <div class="w-full bg-slate-900 border-b border-slate-800 py-4 px-6 flex items-center justify-between">
    
    <div class="flex items-center space-x-3">
        <img src="logo.png" alt="Exam Portal Logo" class="h-10 w-auto object-contain fallback-logo">
        
        <div class="flex flex-col">
            <span class="text-sm font-black text-red-500 tracking-wider uppercase">JECRC</span>
            <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase -mt-1">Exam Portal</span>
        </div>
    </div>

    <div class="hidden sm:flex items-center space-x-2 bg-slate-950 px-3 py-1.5 rounded-lg border border-red-900/30">
        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        <span class="text-[10px] font-mono text-gray-400 uppercase tracking-wider">Secure Node Active</span>
    </div>

</div>
    <div class="bg-gray-800 p-6 sm:p-10 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700 my-4">
        <h1 class="text-2xl sm:text-3xl font-black text-blue-500 mb-2 tracking-wide text-center uppercase">ONLINE EXAM PORTAL</h1>
        <p id="portal-desc" class="text-gray-400 mb-6 text-xs sm:text-sm text-center">Enter your email and password to access the test series.</p>
        
        <form id="direct-login-form" class="space-y-4 sm:space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1 tracking-wider">Email Address</label>
                <input type="email" id="login-email" required placeholder="student@gmail.com" class="w-full bg-gray-700 border border-gray-600 rounded-xl p-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 font-semibold">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1 tracking-wider">Password</label>
                <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-gray-700 border border-gray-600 rounded-xl p-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 font-semibold">
            </div>
            
            <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 px-4 rounded-xl transition duration-300 shadow-md uppercase text-xs sm:text-sm tracking-wider active:scale-[0.99]">
                Sign In / Register
            </button>
        </form>

        <div class="mt-6 text-center text-[10px] sm:text-xs text-gray-500 font-medium">
            Real-time multi-user student verification cluster.
        </div>
    </div>

    <script>
        // Clear cached credentials instantly when landing on login page
        window.onload = function() {
            localStorage.clear();
            console.log("Session memory refreshed.");
        };

        // ⚠️ APNI ASLI SUPABASE CREDENTIALS YAHAN PASTE KAREIN
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('direct-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const loginBtn = document.getElementById('login-btn');

            loginBtn.innerText = "Authenticating...";
            loginBtn.disabled = true;

            try {
                // Step 1: Use .select() instead of .single() to avoid error crashes for new users
                const { data: userRows, error: dbError } = await supabaseClient
                    .from('portal_users')
                    .select('*')
                    .eq('email', email);

                if (dbError) {
                    alert("Database Gateway Error: " + dbError.message);
                    resetBtn();
                    return;
                }

                // Extract user data if exists
                const dbUser = (userRows && userRows.length > 0) ? userRows[0] : null;

                // STRICT SECURITY BLOCK: Admin cannot log in from this student page
                if (dbUser && dbUser.role === 'admin') {
                    alert("Access Denied: Admin authentication is restricted on this terminal. Please use the secure administrative panel.");
                    resetBtn();
                    return;
                }

                if (dbUser) {
                    // CASE A: User already exists in database -> Perform strict login check
                    const { error: logError } = await supabaseClient.auth.signInWithPassword({ 
                        email: email, 
                        password: password 
                    });
                    
                    if (logError) { 
                        alert("Security Exception: Invalid Password for this registered account."); 
                        resetBtn(); 
                        return; 
                    }
                    
                    localStorage.setItem('userEmail', dbUser.email);
                    localStorage.setItem('userName', dbUser.name);
                    window.location.href = "dashboard.html";
                } else {
                    // CASE B: Absolutely New User -> Fresh Registration Mode triggered
                    const { data: regData, error: regError } = await supabaseClient.auth.signUp({ 
                        email: email, 
                        password: password 
                    });

                    if (regError) { 
                        alert("Registration Gateway Error: " + regError.message); 
                        resetBtn(); 
                        return; 
                    }

                    // Sync configuration inside user registry mapping table
                    const extName = email.split('@')[0];
                    const { error: insError } = await supabaseClient
                        .from('portal_users')
                        .insert([{ 
                            email: email, 
                            name: extName, 
                            password: password, 
                            role: 'student' 
                        }]);
                    
                    if (!insError) {
                        localStorage.setItem('userEmail', email);
                        localStorage.setItem('userName', extName);
                        window.location.href = "dashboard.html";
                    } else {
                        alert("Database Initialization Error: " + insError.message);
                        resetBtn();
                    }
                }
            } catch (err) { 
                alert("Processing Matrix Exception."); 
                resetBtn(); 
            }
            function resetBtn() { loginBtn.innerText = "Sign In / Register"; loginBtn.disabled = false; }
        });
        // Automatically handles broken image states seamlessly
document.querySelectorAll('.fallback-logo').forEach(img => {
    img.onerror = function() {
        // If image file fails to load, replace it with a clean text block placeholder dynamically
        this.style.display = 'none';
        console.warn("Logo asset missing from core registry folder repository.");
    };
});
    </script>
</body>
</html>
