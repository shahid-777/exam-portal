<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Student Control Terminal — Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen text-slate-200 flex flex-col justify-between">

    <header class="w-full bg-slate-950/60 backdrop-blur-md border-b border-white/5 py-4 px-6 flex items-center justify-between shadow-lg sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <a href="index.html" class="bg-white/5 border border-white/10 p-2 rounded-xl transition text-slate-400 hover:text-white cursor-pointer mr-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>
            </a>
            <span class="text-sm font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 uppercase">STUDENT PORTAL</span>
        </div>
        <div class="flex items-center space-x-4">
            <span id="student-user" class="text-xs font-mono font-bold bg-white/5 px-3 py-1.5 rounded-xl border border-white/10">Loading User Node...</span>
            <button onclick="logout()" class="bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 text-red-400 text-xs font-bold py-1.5 px-4 rounded-xl cursor-pointer">Logout</button>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="bg-slate-950/40 border border-white/5 rounded-2xl p-5 space-y-4 shadow-xl h-fit">
            <div class="border-b border-white/5 pb-2">
                <h3 class="text-xs font-mono font-black text-slate-400 uppercase tracking-widest">Available Questionpapers</h3>
                <p id="filter-status-desc" class="text-[10px] text-slate-500 font-mono mt-0.5">Streaming targeted database items...</p>
            </div>
            
            <div id="exams-container-pane" class="space-y-2.5 max-h-[500px] overflow-y-auto pr-1">
                <div class="text-xs font-mono text-slate-600 uppercase py-4 animate-pulse text-center">Resolving Rows Matrix...</div>
            </div>
        </div>

        <div class="lg:col-span-2 bg-slate-950/40 border border-white/5 rounded-2xl p-6 space-y-6 shadow-xl">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-white/5 pb-4 gap-3">
                <div>
                    <h3 class="text-sm font-black text-white uppercase tracking-wide">Subject Rank & Score Leaderboard</h3>
                    <p class="text-xs text-slate-400 mt-0.5">Select any target subject context to view ranks hierarchy.</p>
                </div>
                <select id="leaderboard-subject-filter" class="border border-white/10 p-2 text-xs rounded-xl bg-slate-900 text-slate-300 outline-none font-bold">
                    <option value="">-- Choose Subject --</option>
                </select>
            </div>

            <div class="text-center py-12 text-slate-500 font-mono text-xs uppercase">
                Please select a subject above to compile specific ranks board metrics.
            </div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = function() {
            const userEmail = localStorage.getItem('userEmail');
            if(!userEmail) { window.location.replace("index.html"); return; }
            document.getElementById('student-user').innerText = userEmail;

            // URL Parameters tracking
            const urlParams = new URLSearchParams(window.location.search);
            const categoryId = urlParams.get('category_id');

            loadDashboardFilteredExams(categoryId);
        };

        // 🔄 FILTERED DATA EXTRACTION
        async function loadDashboardFilteredExams(catId) {
            const pane = document.getElementById('exams-container-pane');
            const desc = document.getElementById('filter-status-desc');
            try {
                let query = supabaseClient.from('exams').select('id, subject, duration_minutes');
                
                // If Category Identifier exists, apply absolute relational check criteria filter
                if(catId) {
                    query = query.eq('category_id', catId);
                    desc.innerText = `Filtered Category Segment Base: Node #${catId}`;
                } else {
                    desc.innerText = "Showing General Unfiltered Global Array Entries";
                }

                const { data: exams, error } = await query.order('id', { ascending: true });
                if(error) throw error;

                if(!exams || exams.length === 0) {
                    pane.innerHTML = `<div class="text-xs font-mono text-slate-600 text-center py-6">No matching exams connected to this category group node yet.</div>`;
                    return;
                }

                pane.innerHTML = "";
                let selectOptions = `<option value="">-- Choose Subject --</option>`;

                exams.forEach(ex => {
                    selectOptions += `<option value="${ex.id}">${ex.subject.toUpperCase()}</option>`;
                    
                    // 🎯 ONCLICK REDIRECT BINDED TO exam.html Safely
                    pane.innerHTML += `
                        <div class="flex items-center justify-between bg-slate-900/50 p-3.5 rounded-xl border border-white/5 hover:border-blue-500/20 hover:bg-slate-900/80 transition shadow-sm group">
                            <span class="text-xs font-bold text-slate-300 truncate max-w-[150px] uppercase tracking-wide group-hover:text-blue-400 transition">${ex.subject}</span>
                            <button onclick="window.location.href='exam.html?exam_id=${ex.id}'" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-mono font-black py-1.5 px-4 rounded-xl shadow transition uppercase tracking-widest cursor-pointer">
                                Start
                            </button>
                        </div>`;
                });

                document.getElementById('leaderboard-subject-filter').innerHTML = selectOptions;

            } catch(err) {
                pane.innerHTML = `<div class="text-xs font-mono text-red-400 text-center py-4">Intersection break fault.</div>`;
            }
        }

        function logout() { localStorage.clear(); window.location.replace("index.html"); }
    </script>
</body>
</html>
