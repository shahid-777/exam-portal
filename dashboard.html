<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Student Portal Dashboard — Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 font-sans min-h-screen text-slate-200 flex flex-col justify-between">

    <header class="w-full bg-slate-900/60 backdrop-blur-md border-b border-white/5 py-4 px-6 flex items-center justify-between shadow-lg sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="bg-white/95 p-1 rounded-xl">
                <img src="logo.png" alt="Logo" class="h-8 w-auto object-contain">
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 uppercase leading-none">STUDENT HUB</span>
                <span id="user-display-email" class="text-[9px] font-mono font-bold text-slate-500 uppercase tracking-wider mt-0.5">AUTH_USER_STREAM</span>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="handleUserLogout()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-1.5 px-4 rounded-xl text-xs transition">Logout</button>
        </div>
    </header>

    <section class="w-full bg-slate-900/20 border-b border-white/5 py-3 px-6">
        <div class="max-w-7xl mx-auto flex items-center space-x-2 text-xs font-mono text-slate-400">
            <button onclick="loadCategoriesView()" class="hover:text-blue-400 font-bold transition">Root Clusters</button>
            <span id="breadcrumb-arrow" class="hidden">&rarr;</span>
            <span id="breadcrumb-current-category" class="text-blue-400 font-bold hidden">Selected Category</span>
        </div>
    </section>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-8 space-y-12">
        <div class="space-y-1">
            <h3 id="workspace-title" class="text-xl font-black text-slate-100 uppercase tracking-wider">Available Exam Streams</h3>
            <p id="workspace-desc" class="text-xs text-slate-400">Select an academic stream or recruitment category folder to access active examination test papers.</p>
        </div>

        <div id="combo-exams-section-wrapper" class="space-y-4">
            <h4 class="text-xs font-mono font-black text-pink-400 uppercase tracking-widest flex items-center gap-2">
                <span class="flex h-2 w-2 rounded-full bg-pink-500 animate-ping"></span>
                🏆 Active Combined Assessment Clusters
            </h4>
            <div id="student-combo-exams-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div class="space-y-4">
            <h4 id="single-exams-header-title" class="text-xs font-mono font-black text-blue-400 uppercase tracking-widest">📂 Standard Categorized Subject Folders</h4>
            <div id="portal-dynamic-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div class="bg-slate-900/40 border border-white/5 rounded-3xl p-6 shadow-xl pt-6">
            <h2 class="text-sm font-black text-white uppercase tracking-widest font-mono border-b border-white/5 pb-4 mb-4">My Performance Repository</h2>
            <div id="past-results-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isUserSubscribed = false;

        window.onload = async function () {
            const email = localStorage.getItem('userEmail');
            if (!email) { window.location.replace("index.html"); return; }
            document.getElementById('user-display-email').innerText = email;
            
            // 1. Check Subscription State
            isUserSubscribed = await checkUserSubscription(email);
            
            // 2. Load Dashboard Components
            loadCategoriesView();
            renderStudentComboExamLinks();
            fetchStudentPastExamHistory();
        };

        async function checkUserSubscription(email) {
            const { data } = await supabaseClient
                .from('subscriptions')
                .select('is_active')
                .eq('user_email', email)
                .eq('is_active', true)
                .maybeSingle();
            return !!data;
        }

        function handlePaymentRequest() {
            alert("This subject requires a paid subscription. Please contact the administrator at examportalcse@gmail.com to complete your subscription and unlock full library access.");
        }

        // Modified loadExamsSubView to include isLocked check
        async function loadExamsSubView(categoryId, encodedCatName) {
            const categoryName = decodeURIComponent(encodedCatName);
            document.getElementById('workspace-title').innerText = `${categoryName.toUpperCase()} — ACTIVE PAPERS`;
            
            const gridContainer = document.getElementById('portal-dynamic-grid');
            gridContainer.innerHTML = `<div class="text-center font-mono text-xs text-blue-400 py-12 animate-pulse col-span-full">Loading Exams...</div>`;

            const { data: examsList, error } = await supabaseClient.from('exams').select('*').eq('category_id', categoryId);

            if (error || !examsList.length) { gridContainer.innerHTML = "<div class='text-center col-span-full text-slate-500'>No exams found.</div>"; return; }

            gridContainer.innerHTML = "";
            examsList.forEach(exam => {
                const isLocked = exam.is_premium && !isUserSubscribed;
                gridContainer.innerHTML += `
                    <div class="bg-slate-900/40 border ${isLocked ? 'border-amber-500/30' : 'border-white/5'} p-6 rounded-2xl shadow-xl flex flex-col justify-between space-y-4">
                        <div>
                            ${isLocked ? '<span class="text-[9px] font-black text-amber-400 uppercase bg-amber-500/10 px-2 py-0.5 rounded mb-2 inline-block">🔒 Locked</span>' : ''}
                            <h4 class="text-sm font-black text-slate-100 uppercase">${exam.subject}</h4>
                        </div>
                        <button onclick="${isLocked ? 'handlePaymentRequest()' : 'initializeAssessmentRuntime(\'' + encodeURIComponent(exam.subject) + '\')'}" 
                                class="w-full ${isLocked ? 'bg-amber-600 hover:bg-amber-500' : 'bg-blue-600 hover:bg-blue-500'} text-white font-black py-2.5 rounded-xl uppercase text-[10px] transition">
                            ${isLocked ? 'Pay to Unlock' : 'Launch Live Engine'}
                        </button>
                    </div>`;
            });
        }

        // ... (पुराने फंक्शन्स जैसे loadCategoriesView, renderStudentComboExamLinks, fetchStudentPastExamHistory बरकरार हैं) ...
        
        function handleUserLogout() { localStorage.clear(); window.location.replace("index.html"); }
    </script>
</body>
</html>
