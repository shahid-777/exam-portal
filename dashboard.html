<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Examination Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 bg-indigo-900 text-white p-6 flex flex-col justify-between shadow-lg">
        <div>
            <h2 class="text-2xl font-black tracking-wider mb-8 text-indigo-200">EXAM SUITE</h2>
            <div class="mb-6 bg-indigo-950 p-4 rounded-xl border border-indigo-800">
                <p class="text-xs text-indigo-400 font-semibold uppercase">Profile Account</p>
                <p id="user-display-name" class="font-bold truncate text-white text-sm">Loading Student...</p>
            </div>
            <nav class="space-y-3">
                <button onclick="showSection('categories')" class="w-full text-left bg-indigo-800 p-3 rounded-xl font-bold block transition hover:bg-indigo-700">Available Exams</button>
                <button onclick="showSection('leaderboard')" class="w-full text-left p-3 rounded-xl font-bold block transition hover:bg-indigo-700">Global Leaderboard</button>
            </nav>
        </div>
        <button onclick="logout()" class="mt-8 bg-red-600 hover:bg-red-700 font-bold p-3 rounded-xl text-sm transition tracking-wide shadow-inner">Secure Sign Out</button>
    </aside>

    <main class="flex-1 p-6 md:p-10">
        
        <section id="categories-section" class="space-y-6">
            <h3 class="text-2xl font-black text-gray-800 border-b-2 border-indigo-500 pb-2">Active Examination Papers</h3>
            <div id="category-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="exam-section" class="hidden max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-xl border border-gray-200">
            <div class="flex justify-between items-center border-b pb-4 mb-6">
                <h4 id="exam-title" class="text-xl font-black text-indigo-900 uppercase tracking-tight">Subject Paper</h4>
                <div class="bg-red-50 text-red-600 border border-red-200 px-5 py-2 rounded-full font-black text-lg shadow-sm">
                    Time Countdown: <span id="timer">120:00</span>
                </div>
            </div>

            <div id="quiz-container" class="space-y-6 max-h-[60vh] overflow-y-auto pr-3"></div>

            <div class="mt-8 border-t pt-4 flex justify-end">
                <button onclick="submitExam()" class="bg-green-600 hover:bg-green-700 text-white font-black text-lg px-10 py-4 rounded-xl transition duration-300 shadow-lg tracking-wide">Submit Answers</button>
            </div>
        </section>

        <section id="leaderboard-section" class="hidden space-y-6">
            <h3 class="text-2xl font-black text-gray-800 border-b-2 border-indigo-500 pb-2">Global Leaderboard Panel</h3>
            <div class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-black text-gray-500 uppercase tracking-wider">Rank Position</th>
                            <th class="px-6 py-4 text-left text-xs font-black text-gray-500 uppercase tracking-wider">Candidate Profile</th>
                            <th class="px-6 py-4 text-left text-xs font-black text-gray-500 uppercase tracking-wider">Subject Specialty</th>
                            <th class="px-6 py-4 text-left text-xs font-black text-gray-500 uppercase tracking-wider">Evaluation Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-rows" class="divide-y divide-gray-200 text-sm font-medium"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // ⚠️ APNI ASLI SUPABASE CREDENTIALS YAHAN PASTE KAREIN
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentQuestions = [];
        let examTimer;
        
        document.getElementById('user-display-name').innerText = localStorage.getItem('userName') || "Active Candidate";

        function showSection(section) {
            document.getElementById('categories-section').classList.add('hidden');
            document.getElementById('exam-section').classList.add('hidden');
            document.getElementById('leaderboard-section').classList.add('hidden');
            
            if(section === 'categories') {
                document.getElementById('categories-section').classList.remove('hidden');
                loadCategories();
            } else if(section === 'leaderboard') {
                document.getElementById('leaderboard-section').classList.remove('hidden');
                loadLeaderboard();
            }
        }

        // Pulls dynamic exams mapping directly from cloud table schema
        async function loadCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '<p class="text-gray-500 col-span-3 text-center">Loading active exam papers from cloud database...</p>';

            try {
                const { data, error } = await supabaseClient.from('exams').select('subject');
                grid.innerHTML = '';
                
                if(error || !data || data.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-3 text-center p-6 bg-yellow-50 border border-yellow-200 rounded-xl text-yellow-800">
                            <b>No Active Exams Found!</b><br>Please log in as admin and publish an exam paper first.
                        </div>`;
                    return;
                }
                
                data.forEach(row => {
                    grid.innerHTML += `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 hover:shadow-xl transition flex flex-col justify-between">
                            <div>
                                <h4 class="text-lg font-black text-gray-800 mb-1">${row.subject}</h4>
                                <p class="text-xs font-semibold text-indigo-600 mb-4 uppercase">Objective Test Paper</p>
                            </div>
                            <button onclick="startExam('${row.subject}')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition text-center tracking-wide">Unlock Test Paper</button>
                        </div>`;
                });
            } catch (err) {
                grid.innerHTML = '<p class="text-red-500 col-span-3 text-center">Failed to contact the API database cluster.</p>';
            }
        }

        // Fetches questions array seamlessly via exact target match keys
        async function startExam(subject) {
            try {
                const { data, error } = await supabaseClient
                    .from('exams')
                    .select('questions_json')
                    .eq('subject', subject)
                    .single();

                if (data && !error) {
                    document.getElementById('categories-section').classList.add('hidden');
                    document.getElementById('exam-section').classList.remove('hidden');
                    document.getElementById('exam-title').innerText = subject;
                    currentQuestions = data.questions_json;
                    renderQuestions(currentQuestions);
                    startTimer(120 * 60);
                } else {
                    alert("Test paper not found in server records.");
                }
            } catch (err) {
                alert("Network communication error.");
            }
        }

        // Maps strict arrays into secure evaluation grid panels
        function renderQuestions(questions) {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            questions.forEach((q, index) => {
                container.innerHTML += `
                    <div class="p-5 bg-gray-50 rounded-xl border border-gray-200 shadow-sm">
                        <p class="font-bold text-gray-800 mb-4 text-base">${index + 1}. ${q.question}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            ${q.options.map((opt, oIdx) => `
                                <label class="flex items-center gap-3 p-4 bg-white border border-gray-200 rounded-xl cursor-pointer hover:bg-indigo-50 transition border-2 hover:border-indigo-300">
                                    <input type="radio" name="q-${index}" value="${oIdx}" class="text-indigo-600 w-4 h-4 focus:ring-0">
                                    <span class="text-sm font-semibold text-gray-700">${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>`;
            });
        }

        function startTimer(duration) {
            let timer = duration, minutes, seconds;
            examTimer = setInterval(() => {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;
                document.getElementById('timer').textContent = minutes + ":" + seconds;
                if (--timer < 0) {
                    clearInterval(examTimer);
                    submitExam();
                }
            }, 1000);
        }

        // FIXED EVALUATION ENGINE: Validates metrics scoring perfectly inside Supabase
        async function submitExam() {
            clearInterval(examTimer);
            let totalEvaluatedScore = 0;
            currentQuestions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q-${index}"]:checked`);
                if(selected && parseInt(selected.value, 10) === parseInt(q.correct, 10)) {
                    totalEvaluatedScore++;
                }
            });

            try {
                const { error } = await supabaseClient.from('results').insert([{
                    email: localStorage.getItem('userEmail') || "student@email.com",
                    subject: document.getElementById('exam-title').innerText,
                    score: totalEvaluatedScore
                }]);

                if (!error) {
                    alert(`Exam Submitted! Final verified score: ${totalEvaluatedScore} / ${currentQuestions.length}`);
                    showSection('leaderboard');
                } else {
                    alert("Submission error: " + error.message);
                }
            } catch (err) {
                alert("Error writing score matrix.");
            }
        }

        // Syncs high score allocations in real-time array lists
        async function loadLeaderboard() {
            try {
                const { data, error } = await supabaseClient
                    .from('results')
                    .select('*')
                    .order('score', { ascending: false })
                    .limit(50);

                if(data && !error) {
                    const tbody = document.getElementById('leaderboard-rows');
                    tbody.innerHTML = '';
                    data.forEach((row, index) => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-indigo-50/50 transition">
                                <td class="px-6 py-4 font-black text-gray-700">#${index + 1}</td>
                                <td class="px-6 py-4 text-gray-600 font-semibold">${row.email}</td>
                                <td class="px-6 py-4 text-gray-500 font-semibold">${row.subject}</td>
                                <td class="px-6 py-4 text-indigo-600 font-extrabold text-base">${row.score}</td>
                            </tr>`;
                    });
                }
            } catch (err) {
                console.log("Error displaying active scoreboard grids.");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html"; // <-- Reconfigured to direct HTML routing rules
        }

        window.onload = () => { loadCategories(); };
    </script>
</body>
</html>
