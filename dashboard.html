<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="fallback-logo" rel="icon" type="image/png" href="logo.png">
    <title>Student Dashboard - Examination Terminal</title>
    <script>
    // 🛡️ AUTHENTICATION GUARD: BINA LOGIN ACCESS BLOCK KO LOCK KAREIN
    (function() {
        const email = localStorage.getItem('userEmail');
        
        // Agar local storage mein user ka email session nahi milta hai
        if (!email) {
            alert("Access Denied: Please sign in via the official entry gateway first.");
            // Instant redirect to login portal layer
            window.location.replace("index.html");
        }
    })();
</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    
    <div class="w-full bg-slate-900 border-b border-slate-800 py-4 px-6 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="bg-white p-1 rounded-lg flex items-center justify-center">
                <img src="logo.png" alt="Exam Portal Logo" class="h-8 w-auto object-contain fallback-logo">
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-black text-red-500 tracking-wider uppercase leading-none">Online</span>
                <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase font-mono mt-0.5">Exam Portal</span>
            </div>
        </div>

        <div class="hidden sm:flex items-center space-x-2 bg-slate-950 px-3 py-1.5 rounded-lg border border-emerald-500/20">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-mono text-emerald-400 uppercase tracking-wider">Secure Node Active</span>
        </div>
    </div>

    <header class="bg-gray-900 text-white px-4 sm:px-8 py-4 flex flex-col sm:flex-row gap-3 justify-between items-center shadow-md">
        <div class="text-center sm:text-left">
            <h1 class="text-lg sm:text-xl font-black text-blue-400 tracking-wider uppercase">STUDENT PORTAL</h1>
            <p id="user-display" class="text-xs text-gray-400 font-medium font-mono mt-0.5 break-all"></p>
        </div>
        <button onclick="localStorage.clear(); window.location.href='index.html';" class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold text-xs px-5 py-2.5 rounded-xl transition shadow active:scale-95">
            Secure Log Out
        </button>
    </header>

    <main class="p-4 sm:p-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-lg font-black text-gray-700 uppercase tracking-wide">Available Examinations</h2>
            <div id="exams-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-black text-gray-700 uppercase tracking-wide">Global Leaderboard Panel</h2>
            <div class="w-full overflow-x-auto rounded-2xl border border-gray-200 bg-white shadow-sm">
                <table class="w-full text-left border-collapse min-w-[300px] sm:min-w-full">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-[10px] sm:text-xs font-bold uppercase text-gray-500 tracking-wider">
                            <th class="py-3 px-3 text-center w-12 sm:w-16">Rank</th>
                            <th class="py-3 px-3">Candidate Name</th>
                            <th class="py-3 px-3 text-center w-16 sm:w-20">Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-rows" class="divide-y divide-gray-100 text-xs sm:text-sm font-semibold text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function() {
            const email = localStorage.getItem('userEmail');
            const name = localStorage.getItem('userName');
            if(!email) { window.location.href = "index.html"; return; }
            
            // Display clean layout names
            const cleanUserDisplay = name ? name : extractCleanName(email);
            document.getElementById('user-display').innerText = `Active Account: ${cleanUserDisplay}`;
            
            await loadExams();
            await loadLeaderboard();
        };

        // 🌟 HELPER FUNCTION: Email se clean name generate karne ke liye
        function extractCleanName(inputString) {
            if (!inputString) return "Anonymous Candidate";
            // Agar input ek valid email format hai, toh @ ke pehle ka hissa nikalenge
            if (inputString.includes('@')) {
                let textPart = inputString.split('@')[0];
                return textPart.replace(/[._]/g, ' '); // dot aur underscore ko space se badla
            }
            return inputString;
        }

        async function loadExams() {
    const { data } = await supabaseClient.from('exams').select('subject');
    const container = document.getElementById('exams-container');
    container.innerHTML = "";
    if(data) {
        data.forEach(exam => {
            const encodedSubject = encodeURIComponent(exam.subject);

            // 🌟 ALERT PURA DELETE KAR DIYA HAI AUR DYNAMIC LINK BIND KIYA HAI
            container.innerHTML += `
                <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between space-y-4">
                    <div>
                        <h3 class="font-black text-gray-800 text-base sm:text-lg">${exam.subject}</h3>
                        <p class="text-xs text-gray-400 font-medium">Standard Academic Evaluation Syllabus</p>
                    </div>
                    <button onclick="startStudentExamination('${encodedSubject}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs py-3 px-4 rounded-xl uppercase tracking-wider transition active:scale-95">
                        Start Examination
                    </button>
                </div>
            `;
        });
    }
}

// 🌐 REDIRECT ROUTER ENGINE
function startStudentExamination(subjectName) {
    // ?v=1.0.1 browser cache bypass karne ke liye jodna zaroori hai
    window.location.href = `exam.html?subject=${subjectName}&v=1.0.1`;
}
      async function loadLeaderboard() {
    const { data } = await supabaseClient.from('results').select('*').order('score', { ascending: false });
    const tbody = document.getElementById('leaderboard-rows');
    tbody.innerHTML = "";
    if(data) {
        data.forEach((row, idx) => {
            // 🔍 DYNAMIC CHECK: Agar row.name nahi milta, toh row.email check karega
            const rawIdentifier = row.name || row.email || "Candidate User";
            
            // Safe filter to extract clean name
            const cleanCandidateName = extractCleanName(rawIdentifier);

            tbody.innerHTML += `
                <tr class="hover:bg-gray-50/80 transition duration-150">
                    <td class="py-3.5 px-3 text-center font-bold text-blue-600">#${idx + 1}</td>
                    <td class="py-3.5 px-3 font-medium text-gray-900 capitalize break-all max-w-[140px] sm:max-w-none">${cleanCandidateName}</td>
                    <td class="py-3.5 px-3 text-center font-black text-green-600">${row.score}</td>
                </tr>
            `;
        });
    }
}
        // Handles broken logo image fallbacks
        document.querySelectorAll('.fallback-logo').forEach(img => {
            img.onerror = function() {
                this.style.display = 'none';
            };
        });
    </script>
</body>
</html>
