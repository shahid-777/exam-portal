<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Student Terminal — Assessment Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 font-sans min-h-screen text-slate-200 flex flex-col justify-between select-none">

    <header class="w-full bg-slate-900/60 backdrop-blur-md border-b border-white/5 py-4 px-6 flex items-center justify-between shadow-lg sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="bg-white/95 p-1 rounded-xl shrink-0">
                <img src="logo.png" alt="Logo" class="h-8 w-auto object-contain">
            </div>
            <div class="flex flex-col">
                <span id="active-category-title" class="text-xs font-black tracking-widest text-blue-400 uppercase leading-none">LOADING GRID...</span>
                <span class="text-[8px] font-mono font-bold text-slate-500 uppercase tracking-wider mt-0.5">EXAM CATEGORY EXPLORER</span>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <span id="display-user-session" class="text-xs font-mono text-emerald-400 font-bold hidden sm:inline"></span>
            <button onclick="terminateSessionProcess()" class="bg-slate-800 hover:bg-red-900/20 text-slate-300 hover:text-red-400 border border-white/5 hover:border-red-500/20 font-bold py-1.5 px-4 rounded-xl text-xs transition cursor-pointer">
                Logout
            </button>
        </div>
    </header>

    <section class="max-w-5xl w-full mx-auto px-6 pt-10 text-center sm:text-left space-y-2">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-white/5 pb-4">
            <div>
                <h2 class="text-xl sm:text-2xl font-black tracking-tight text-white uppercase">Active Evaluation Nodes</h2>
                <p class="text-xs text-slate-400 mt-1 font-medium">Select an objective paper matrix deployment block below to launch secure live engine monitors.</p>
            </div>
            <button onclick="window.location.replace('index.html')" class="text-xs font-bold font-mono text-blue-400 hover:underline flex items-center gap-1">
                &larr; Back to Categories
            </button>
        </div>
    </section>

    <main class="flex-1 max-w-5xl w-full mx-auto px-6 py-8">
        <div id="exams-matrix-pipeline" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full text-center text-slate-500 font-mono text-xs py-12 animate-pulse uppercase">
                Synchronizing Category Node Registries...
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-4 border-t border-white/5 bg-slate-900/40 text-[9px] font-mono text-slate-600 uppercase tracking-widest">
        &copy; Computer Science Management System Terminal — JECRC University
    </footer>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let targetCategoryDomain = "";

        window.onload = function() {
            // 🔒 1. सुरक्षा गार्ड: चेक करें कि क्या यूज़र लॉगिन है
            const activeUser = localStorage.getItem('userEmail');
            if (!activeUser) {
                // लॉगिन नहीं है तो सीधे होम पेज पर फेंक दो
                window.location.replace("index.html");
                return;
            }
            document.getElementById('display-user-session').innerText = activeUser.toLowerCase();

            // 🎯 2. यूआरएल से चुनी गई कैटेगरी का नाम निकालना
            const urlParams = new URLSearchParams(window.location.search);
            const categoryParam = urlParams.get('category');

            if (!categoryParam) {
                // अगर बिना कैटेगरी डायरेक्ट डैशबोर्ड खोला तो वापस भेजो
                window.location.replace("index.html");
                return;
            }

            targetCategoryDomain = decodeURIComponent(categoryParam);
            document.getElementById('active-category-title').innerText = targetCategoryDomain.toUpperCase();

            // 🚀 3. केवल इस कैटेगरी की परीक्षाओं को डेटाबेस से लोड करें
            fetchActiveCategoryExams(targetCategoryDomain);
        };

        // 🔄 SUPABASE SELECT QUERY WITH DYNAMIC FILTERING
       async function fetchActiveCategoryExams(category) {
    const container = document.getElementById('exams-matrix-pipeline');
    
    try {
        console.log("Querying database for category:", category);

        // Supabase se active category ke exams select karna
        const { data: exams, error } = await supabaseClient
            .from('exams')
            .select('*')
            .ilike('category_name', category); 

        if (error) throw error;

        if (!exams || exams.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center font-mono text-xs text-slate-500 border border-white/5 p-8 rounded-2xl bg-white/[0.01]">
                    No active exam papers uploaded under this domain block yet.
                </div>`;
            return;
        }

        let htmlContent = "";
        exams.forEach(exam => {
            let duration = exam.duration_minutes || exam.duration || 60;
            let qCount = exam.total_questions || 0;
            
            // 🎯 FIXED: Agar questions_json pehle se Object hai, toh directly .length lein, parse na karein
            if(!qCount && exam.questions_json) {
                if (typeof exam.questions_json === 'string') {
                    try {
                        const parsedQ = JSON.parse(exam.questions_json);
                        qCount = parsedQ.length;
                    } catch(e) {
                        qCount = 0;
                    }
                } else if (Array.isArray(exam.questions_json)) {
                    qCount = exam.questions_json.length; // Agar database se direct array mila
                }
            }

            htmlContent += `
                <div class="bg-slate-900/40 border border-white/5 p-5 rounded-2xl flex flex-col justify-between space-y-4 shadow-xl hover:border-blue-500/20 transition">
                    <div class="space-y-1">
                        <h3 class="text-md font-bold text-white tracking-wide">${exam.subject}</h3>
                        <div class="flex items-center space-x-4 pt-1 text-[10px] font-mono text-slate-400">
                            <div>Questions: <span class="text-blue-400 font-bold">${qCount}</span></div>
                            <div>Duration: <span class="text-blue-400 font-bold">${duration} Min</span></div>
                        </div>
                    </div>
                    <button onclick="launchExamEngine('${encodeURIComponent(exam.subject)}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-2.5 rounded-xl text-xs uppercase tracking-wider shadow-lg transition transform active:scale-95 cursor-pointer">
                        Launch Live Engine
                    </button>
                </div>
            `;
        });

        container.innerHTML = htmlContent;

    } catch (err) {
        console.error("CRITICAL DASHBOARD ERROR:", err);
        container.innerHTML = `
            <div class="col-span-full text-center font-mono text-xs text-red-400 border border-red-500/10 p-6 rounded-2xl bg-red-500/5">
                Failed to map exam clusters from database registry pipeline.<br>
                <span class="text-[10px] text-slate-500 mt-2 block">Error: ${err.message || err.details || 'Schema Mismatch'}</span>
            </div>`;
    }
}
        // 🚀 एग्जाम इंजन शुरू करने का नेविगेशन
        function launchExamEngine(subjectName) {
            window.location.href = `exam.html?subject=${subjectName}`;
        }

        // 🔒 लॉगआउट प्रोसेस
        function terminateSessionProcess() {
            localStorage.removeItem('userEmail');
            alert("Session terminated successfully.");
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
