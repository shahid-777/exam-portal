<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="rounded-xl" rel="icon" type="image/png" href="logo.png">
    <title>Student Dashboard — Exam Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 font-sans min-h-screen text-slate-200 flex flex-col justify-between select-none">

    <header class="w-full bg-slate-900/60 backdrop-blur-md border-b border-white/5 py-3 px-4 sm:px-6 flex items-center justify-between shadow-lg sticky top-0 z-50">
        <div class="flex items-center space-x-2.5 max-w-[45%] min-w-0">
            <div class="bg-white/95 p-1 rounded-xl shrink-0">
                <img src="logo.png" alt="Logo" class="h-7 sm:h-8 w-auto object-contain">
            </div>
            <div class="flex flex-col truncate">
                <span class="text-[11px] sm:text-sm font-black tracking-widest text-blue-400 uppercase leading-none truncate">STUDENT HUB</span>
                <span class="text-[7px] sm:text-[8px] font-mono font-bold text-slate-500 uppercase tracking-wider mt-0.5 truncate">DASHBOARD TERMINAL</span>
            </div>
        </div>

        <div class="flex items-center space-x-3 shrink-0">
            <span id="display-user-session" class="text-[10px] sm:text-xs font-mono text-emerald-400 font-bold max-w-[150px] truncate"></span>
            <button onclick="handleUserLogout()" class="text-[9px] sm:text-xs font-bold text-red-400 hover:bg-red-500/10 border border-red-500/20 px-2.5 py-1.5 rounded-xl transition cursor-pointer">Logout</button>
        </div>
    </header>

    <section class="max-w-5xl w-full mx-auto px-4 sm:px-6 pt-8 sm:pt-12 text-center space-y-2">
        <h1 id="active-category-title" class="text-2xl sm:text-4xl font-black tracking-tight text-white uppercase leading-tight">
            AVAILABLE EXAM STREAMS
        </h1>
        <p id="active-category-desc" class="text-[11px] sm:text-xs font-mono text-slate-400 max-w-2xl mx-auto leading-relaxed">
            Select a category below to explore its active examinations list.
        </p>
    </section>

    <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-8">
        
        <div id="categories-view-container" class="space-y-4">
            <div class="text-center py-12">
                <p class="text-xs text-slate-500 font-mono animate-pulse">Connecting to database architecture...</p>
            </div>
        </div>

        <div id="exams-view-container" class="space-y-6 hidden">
            
            <button onclick="resetToCategoriesView()" class="inline-flex items-center space-x-2 text-xs font-mono font-bold text-blue-400 hover:text-blue-300 transition bg-blue-500/5 hover:bg-blue-500/10 border border-blue-500/10 px-3 py-1.5 rounded-xl cursor-pointer shadow-md">
                <span>&larr;</span> <span>Back to Categories</span>
            </button>

            <div id="active-exams-list-target" class="space-y-3">
                <p class="text-xs text-center text-slate-500 font-mono">Compiling authorized data sheets...</p>
            </div>
        </div>

    </main>

    <footer class="w-full text-center py-3 border-t border-white/5 bg-slate-900/40 text-[9px] font-mono text-slate-600 uppercase tracking-widest">
        &copy; Computer Science Management System Terminal
    </footer>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function() {
            const activeUser = localStorage.getItem('userEmail');
            if (!activeUser || activeUser === "null" || activeUser.trim() === "") {
                window.location.replace("index.html");
                return;
            }
            
            document.getElementById('display-user-session').innerText = activeUser.toLowerCase();

            // 1. Fetch all folders from Database table 'exam_categories'
            await fetchAllDatabaseCategories();

            // 2. Manage state via URL Params
            const urlParams = new URLSearchParams(window.location.search);
            const categoryParam = urlParams.get('category');
            const catIdParam = urlParams.get('catid');

            if (categoryParam && catIdParam && catIdParam !== 'undefined') {
                selectDashboardCategory(decodeURIComponent(categoryParam), catIdParam);
            } else {
                resetToCategoriesView();
            }
        };

        // 🎯 FIX: Fetches data with mapped 'category_name' column
        async function fetchAllDatabaseCategories() {
            try {
                const { data, error } = await supabaseClient.from('exam_categories').select('*');
                if (error) throw error;

                const container = document.getElementById('categories-view-container');
                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="text-xs font-mono text-center text-slate-600">No folders mapped in structural tables.</p>`;
                    return;
                }

                // UI mapping using exact 'category_name' column
                container.innerHTML = data.map(cat => `
                    <div onclick="selectDashboardCategory('${cat.category_name}', ${cat.id})" class="bg-slate-900/40 border border-white/5 p-5 rounded-2xl flex items-center justify-between shadow-xl hover:border-blue-500/30 hover:bg-slate-900/70 transition transform hover:-translate-y-0.5 cursor-pointer group">
                        <div class="flex items-center space-x-4 min-w-0">
                            <div class="bg-blue-600/10 border border-blue-500/20 p-3 rounded-xl shrink-0 text-blue-400">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                                </svg>
                            </div>
                            <h4 class="text-xs sm:text-sm font-black text-slate-200 tracking-wider uppercase truncate">${cat.category_name}</h4>
                        </div>
                        <span class="text-[10px] font-mono font-bold text-slate-500 group-hover:text-blue-400 transition uppercase tracking-wider shrink-0">Open Folder &rarr;</span>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Failed to load categories:", err);
                document.getElementById('categories-view-container').innerHTML = `<p class="text-xs text-red-400 font-mono text-center">Data structure fetch exception error.</p>`;
            }
        }

        // 🎯 View Switcher Handler
        async function selectDashboardCategory(categoryName, categoryId) {
            const newUrl = `${window.location.pathname}?category=${encodeURIComponent(categoryName)}&catid=${categoryId}`;
            window.history.pushState({ path: newUrl }, '', newUrl);

            document.getElementById('active-category-title').innerText = categoryName.toUpperCase();
            document.getElementById('active-category-desc').innerText = "Review the compiled list of active exam slots below.";

            document.getElementById('categories-view-container').classList.add('hidden');
            document.getElementById('exams-view-container').classList.remove('hidden');

            await fetchActiveCategoryExams(categoryId);
        }

        // 🎯 FIX: Fetches data with mapped 'subject' & 'duration_minutes' columns
        async function fetchActiveCategoryExams(categoryId) {
            const listTarget = document.getElementById('active-exams-list-target');
            listTarget.innerHTML = `<p class="text-xs font-mono text-center text-slate-500 animate-pulse">Decrypting encrypted question vaults...</p>`;

            try {
                const { data, error } = await supabaseClient.from('exams').select('*').eq('category_id', categoryId);
                if (error) throw error;

                if (!data || data.length === 0) {
                    listTarget.innerHTML = `
                        <div class="text-center p-8 bg-slate-900/20 border border-dashed border-white/5 rounded-2xl">
                            <p class="text-xs font-mono text-slate-500">No examinations are currently active in this stream folder.</p>
                        </div>`;
                    return;
                }

                // UI mapping using exact 'subject' and 'duration_minutes' columns
                listTarget.innerHTML = data.map(exam => `
                    <div class="bg-slate-900/50 border border-white/5 p-5 rounded-2xl flex items-center justify-between shadow-xl hover:border-blue-500/20 transition">
                        <div class="space-y-1">
                            <span class="px-2 py-0.5 text-[8px] font-mono font-bold bg-blue-500/10 border border-blue-500/20 text-blue-400 rounded-md uppercase">LIVE METRIC SHEET</span>
                            <h4 class="text-xs sm:text-sm font-bold text-slate-200 mt-1 uppercase">${exam.subject || 'Untitled Exam'}</h4>
                            <p class="text-[9px] font-mono text-slate-500">Duration: ${exam.duration_minutes || '60'} Mins | Authorization Block: EX-${exam.id}</p>
                        </div>
                        <button class="bg-blue-600 hover:bg-blue-500 text-white font-bold text-[10px] font-mono uppercase px-4 py-2 rounded-xl transition shadow-lg shadow-blue-600/10 cursor-pointer">Start</button>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Failed to load exams:", err);
                listTarget.innerHTML = `<p class="text-xs text-red-400 font-mono text-center">Error parsing authorized parameters.</p>`;
            }
        }

        // 🎯 Reset view back to folder list
        function resetToCategoriesView() {
            const cleanUrl = window.location.pathname;
            window.history.pushState({ path: cleanUrl }, '', cleanUrl);

            document.getElementById('active-category-title').innerText = "AVAILABLE EXAM STREAMS";
            document.getElementById('active-category-desc').innerText = "Select a category below to explore its active examinations list.";

            document.getElementById('exams-view-container').classList.add('hidden');
            document.getElementById('categories-view-container').classList.remove('hidden');
        }

        function handleUserLogout() {
            localStorage.removeItem('userEmail');
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
