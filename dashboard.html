<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            if (!localStorage.getItem('userEmail')) {
                window.location.replace("index.html");
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Student Control Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <header class="bg-slate-900 text-white px-4 sm:px-8 py-3.5 flex items-center justify-between shadow-md sticky top-0 z-50">
        <div class="flex items-center space-x-2 shrink-0">
            <img src="logo.png" alt="Logo" class="h-8 w-auto bg-white p-1 rounded-lg">
            <h1 class="text-xs sm:text-sm font-black tracking-wider uppercase text-blue-400 font-mono">STUDENT PORTAL</h1>
        </div>
        <div class="flex items-center space-x-2 max-w-[65%] sm:max-w-auto justify-end">
            <span id="user-display" class="text-[11px] sm:text-xs bg-slate-800 border border-slate-700 px-2.5 py-1.5 rounded-xl text-slate-300 font-bold font-sans truncate max-w-[90px] sm:max-w-[150px] text-center">Student</span>
            <button onclick="logoutSession()" class="bg-red-600/10 hover:bg-red-600 border border-red-500/20 text-red-400 hover:text-white font-black text-[10px] sm:text-xs py-1.5 px-3 rounded-xl transition shrink-0 active:scale-95">Logout</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 border-b pb-2 font-mono">Available Questionpapers</h3>
                <div id="subjects-list-container" class="space-y-2.5">
                    <p class="text-xs text-gray-400 font-semibold animate-pulse">Syncing active question papers...</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-4">
            <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-gray-200 space-y-5">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b pb-4 border-slate-100">
                    <div>
                        <h3 class="text-sm font-black text-gray-900 uppercase tracking-wider">Subject Rank & Score Leaderboard</h3>
                        <p class="text-[11px] font-medium text-slate-400">Select any target subject context to view ranks hierarchy.</p>
                    </div>
                    <select id="leaderboard-subject-filter" onchange="loadSubjectWiseLeaderboard()" class="w-full sm:w-56 border-2 p-2 text-xs rounded-xl bg-slate-50 font-bold text-slate-700 outline-none border-slate-200">
                        <option value="">-- Choose Subject --</option>
                    </select>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900 text-white text-[10px] sm:text-xs font-mono uppercase tracking-widest">
                                <th class="p-3.5 rounded-l-xl text-center">Rank</th>
                                <th class="p-3.5">Student Name / Identifier</th>
                                <th class="p-3.5 text-center">Score</th>
                                <th class="p-3.5 text-center rounded-r-xl">Total Items</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-rows-container" class="text-xs font-medium text-gray-700 divide-y divide-gray-100">
                            <tr>
                                <td colspan="4" class="text-center p-8 text-gray-400 font-bold">Please select a subject above to compile specific ranks board metrics.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function() {
            document.getElementById('user-display').innerText = localStorage.getItem('userName') || "Student";
            await initializeDashboardData();
        };

        async function initializeDashboardData() {
            try {
                const { data: examsData } = await supabaseClient.from('exams').select('subject');
                const listContainer = document.getElementById('subjects-list-container');
                const filterDropdown = document.getElementById('leaderboard-subject-filter');
                listContainer.innerHTML = "";
                
                if (examsData && examsData.length > 0) {
                    examsData.forEach(row => {
                        listContainer.innerHTML += `
                            <div class="flex items-center justify-between p-3 bg-slate-50 hover:bg-blue-50/50 rounded-xl border border-slate-200 transition">
                                <span class="text-xs font-bold text-slate-700 truncate pr-2">${row.subject}</span>
                                <button onclick="launchExaminationSession('${encodeURIComponent(row.subject)}')" class="bg-blue-600 hover:bg-blue-700 text-white font-black text-[10px] uppercase tracking-wider py-1.5 px-3 rounded-lg shadow-sm transition">Start</button>
                            </div>`;
                        
                        let opt = document.createElement('option');
                        opt.value = row.subject; opt.innerHTML = row.subject;
                        filterDropdown.appendChild(opt);
                    });

                    // ⚙️ AUTOMATED LEADERBOARD TRIGGER INJECTION BLOCK
                    const lastSubject = localStorage.getItem('lastAttendedSubject');
                    if (lastSubject) {
                        filterDropdown.value = lastSubject;
                        // Clears the token state so next fresh dashboard loads normally
                        localStorage.removeItem('lastAttendedSubject'); 
                        loadSubjectWiseLeaderboard(); 
                    }

                } else {
                    listContainer.innerHTML = `<p class="text-xs text-gray-400 font-bold p-2">No question papers uploaded by admin yet.</p>`;
                }
            } catch (err) { console.log(err); }
        }

        async function loadSubjectWiseLeaderboard() {
            const targetSubject = document.getElementById('leaderboard-subject-filter').value;
            const container = document.getElementById('leaderboard-rows-container');
            if (!targetSubject) {
                container.innerHTML = `<tr><td colspan="4" class="text-center p-8 text-gray-400 font-bold">Please select a subject above to compile specific ranks board metrics.</td></tr>`;
                return;
            }

            container.innerHTML = `<tr><td colspan="4" class="text-center p-8 text-blue-500 font-bold animate-pulse">Compiling subject ranks matrix...</td></tr>`;

            try {
                const { data: resultsData, error } = await supabaseClient
                    .from('results')
                    .select('name, score, total_questions')
                    .eq('subject', targetSubject)
                    .order('score', { ascending: false });

                if (error || !resultsData || resultsData.length === 0) {
                    container.innerHTML = `<tr><td colspan="4" class="text-center p-8 text-amber-600 font-bold">No exam submissions recorded yet for this subject.</td></tr>`;
                    return;
                }

                container.innerHTML = "";
                resultsData.forEach((row, index) => {
                    const currentRank = index + 1;
                    let rankBadgeStyle = "bg-slate-100 text-slate-600";
                    if(currentRank === 1) rankBadgeStyle = "bg-amber-500 text-white ring-2 ring-amber-300 font-black";
                    else if(currentRank === 2) rankBadgeStyle = "bg-slate-300 text-slate-800 font-black";
                    else if(currentRank === 3) rankBadgeStyle = "bg-orange-400 text-white font-black";

                    container.innerHTML += `
                        <tr class="hover:bg-slate-50/60 transition duration-75">
                            <td class="p-3 text-center">
                                <span class="inline-flex items-center justify-center w-6 h-6 rounded-full text-[11px] ${rankBadgeStyle}">${currentRank}</span>
                            </td>
                            <td class="p-3 font-semibold text-slate-800">${row.name || 'Anonymous Student'}</td>
                            <td class="p-3 text-center font-mono font-black text-blue-600">${row.score}</td>
                            <td class="p-3 text-center font-mono text-slate-400">${row.total_questions || '--'}</td>
                        </tr>`;
                });
            } catch (err) {
                container.innerHTML = `<tr><td colspan="4" class="text-center p-8 text-red-500 font-bold">Network structural data fetch error.</td></tr>`;
            }
        }

        function launchExaminationSession(encodedSubject) { window.location.href = `exam.html?subject=${encodedSubject}`; }
        function logoutSession() { localStorage.clear(); window.location.replace("index.html"); }
    </script>
</body>
</html>
