<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // 🛡️ ADMINISTRATIVE TERMINAL SECURE ENTRY GATEWAY
        (function() {
            const adminEmail = localStorage.getItem('adminEmail');
            const adminLoginTime = localStorage.getItem('adminSessionTime');
            if (!adminEmail || !adminLoginTime) {
                localStorage.clear();
                alert("Access Denied: Administrative terminal requires official authorization key.");
                window.location.replace("admin-login.html");
                return;
            }
            const OFFICIAL_ADMIN_EMAIL = "shahid.gauri2@gmail.com"; 
            if (adminEmail.toLowerCase() !== OFFICIAL_ADMIN_EMAIL.toLowerCase()) {
                alert("Security Breach: Your current active account token is not authorized to access the Admin Panel.");
                window.location.replace("dashboard.html");
                return;
            }
            if (Date.now() - parseInt(adminLoginTime, 10) > 1 * 60 * 60 * 1000) {
                localStorage.clear();
                alert("Admin Session Expired: Please re-authenticate via secure entry gateway.");
                window.location.replace("index.html");
                return;
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Management Console - Admin Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <header class="bg-gray-900 text-white px-4 sm:px-8 py-4 flex flex-col sm:flex-row gap-3 justify-between items-center shadow-lg">
        <h1 class="text-lg sm:text-xl font-black tracking-wider text-blue-400 uppercase">ADMIN CONTROL CENTER</h1>
        <button onclick="logoutAdminSession()" class="w-full sm:w-auto text-center font-bold text-xs bg-gray-800 px-5 py-2.5 rounded-xl hover:bg-gray-700 transition">Exit Session</button>
    </header>

    <main class="p-4 sm:p-6 max-w-4xl mx-auto">
        <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-md border border-gray-200 space-y-5">
            <h2 class="text-lg sm:text-xl font-black text-gray-800 uppercase tracking-wide">Add or Edit Subject Question Banks</h2>
            
            <div class="flex flex-col sm:flex-row gap-3 items-end">
                <div class="w-full flex-1">
                    <label class="block text-xs sm:text-sm font-bold text-gray-700 mb-1.5">Select Existing Subject to Edit</label>
                    <select id="admin-select-subject" class="w-full border-2 p-3 text-sm rounded-xl bg-gray-50 font-semibold text-gray-700">
                        <option value="">-- Select a subject --</option>
                    </select>
                </div>
                <button id="fetch-btn" onclick="fetchSubjectForEditing()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-3.5 px-6 rounded-xl transition shadow">Fetch MCQs</button>
            </div>

            <div>
                <label class="block text-xs sm:text-sm font-bold text-gray-700 mb-1.5">Subject Target Context</label>
                <input type="text" id="admin-subject" placeholder="e.g., Programming Fundamentals" class="w-full border-2 p-3 text-sm rounded-xl font-semibold text-gray-800">
            </div>

            <div>
                <label class="block text-xs sm:text-sm font-bold text-gray-700 mb-1.5">Paste / Edit Raw Text MCQs</label>
                <textarea id="admin-paste-area" rows="14" placeholder="1. What will be the output?&#10;#include <stdio.h>&#10;int main() { return 0; }&#10;A. 10&#10;B. 20&#10;Answer: A" class="w-full border-2 p-3 rounded-xl font-mono text-xs bg-gray-50 text-gray-800 outline-none focus:border-blue-500"></textarea>
            </div>

            <button id="upload-btn" onclick="handleMCQUploadProcess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-6 rounded-xl transition shadow-lg uppercase text-xs tracking-wide">Save / Update Subject in Database</button>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function() {
            try {
                const { data } = await supabaseClient.from('exams').select('subject');
                const select = document.getElementById('admin-select-subject');
                if(data) data.forEach(row => { let opt = document.createElement('option'); opt.value = row.subject; opt.innerHTML = row.subject; select.appendChild(opt); });
            } catch (err) { console.log("Init completed."); }
        }

        function escapeHTML(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function unescapeHTML(text) {
            return text.replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&amp;/g, "&");
        }

        async function fetchSubjectForEditing() {
            const selectedSubject = document.getElementById('admin-select-subject').value; if(!selectedSubject) return;
            document.getElementById('admin-subject').value = selectedSubject;
            const textArea = document.getElementById('admin-paste-area'); const fetchBtn = document.getElementById('fetch-btn');
            fetchBtn.innerText = "Fetching..."; fetchBtn.disabled = true;
            try {
                const { data } = await supabaseClient.from('exams').select('questions_json').eq('subject', selectedSubject).single();
                if (data && Array.isArray(data.questions_json)) {
                    let text = "";
                    data.questions_json.forEach((q, idx) => {
                        text += `${idx + 1}. ${unescapeHTML(q.question)}\n`;
                        if(Array.isArray(q.options)) q.options.forEach((o, oId) => { text += `${['A','B','C','D'][oId] || 'A'}. ${o}\n`; });
                        text += `Answer: ${['A','B','C','D'][parseInt(q.correct, 10)] || 'A'}\n\n`;
                    });
                    textArea.value = text.trim();
                }
            } catch (err) { console.log(err); } finally { fetchBtn.innerText = "Fetch MCQs"; fetchBtn.disabled = false; }
        }

        // 🛠️ ADVANCED ACUMULATOR PARSER FOR COMPILING MULTI-LINE PROGRAM CODES
        function parseRawMCQs(rawText) {
            const lines = rawText.split('\n');
            const questionsArray = [];
            let currentQuestion = null;
            const lbls = ['A', 'B', 'C', 'D'];

            lines.forEach(lineRaw => {
                const lineTrimmed = lineRaw.trim();
                
                // Check format anchors
                const questionMatch = lineTrimmed.match(/^(\d+)[\s.)-]+\s*(.+)/);
                const optionMatch = lineTrimmed.match(/^([A-D])[\s.)-]+\s*(.+)/i);
                const answerMatch = lineTrimmed.toLowerCase().startsWith('answer:') || lineTrimmed.toLowerCase().startsWith('ans:');

                if (questionMatch && !optionMatch && !answerMatch) {
                    // Save previous question if fully compiled
                    if (currentQuestion && currentQuestion.options.length >= 2) {
                        currentQuestion.question = escapeHTML(currentQuestion.question.trim());
                        questionsArray.push(currentQuestion);
                    }
                    currentQuestion = {
                        question: questionMatch[2].trim(),
                        options: [],
                        correct: 0
                    };
                } 
                else if (optionMatch) {
                    if (currentQuestion) {
                        currentQuestion.options.push(optionMatch[2].trim());
                    }
                } 
                else if (answerMatch) {
                    if (currentQuestion) {
                        const parts = lineTrimmed.split(':');
                        if (parts[1]) {
                            const ansLetter = parts[1].trim().toUpperCase();
                            const indexMapping = lbls.indexOf(ansLetter);
                            currentQuestion.correct = indexMapping !== -1 ? indexMapping : 0;
                        }
                    }
                } 
                else {
                    // 🔥 IMPORTANT: Agar normal characters ya multi-line programming statement h, toh use content block mein append krte jao
                    if (currentQuestion && currentQuestion.options.length === 0) {
                        currentQuestion.question += "\n" + lineRaw; 
                    }
                }
            });

            if (currentQuestion && currentQuestion.options.length >= 2) {
                currentQuestion.question = escapeHTML(currentQuestion.question.trim());
                questionsArray.push(currentQuestion);
            }

            return questionsArray;
        }

        async function handleMCQUploadProcess() {
            const subjectInput = document.getElementById('admin-subject').value.trim();
            const rawText = document.getElementById('admin-paste-area').value; 
            const uploadBtn = document.getElementById('upload-btn');

            if (!subjectInput || !rawText.trim()) { alert("Please ensure fields are not empty."); return; }

            uploadBtn.innerText = "Processing & Saving Structural Logic...";
            uploadBtn.disabled = true;

            const parsedQuestions = parseRawMCQs(rawText);

            if (parsedQuestions.length === 0) {
                alert("Parsing format validation failure. Please verify text hierarchy.");
                uploadBtn.innerText = "Save / Update Subject in Database";
                uploadBtn.disabled = false;
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('exams')
                    .upsert({ subject: subjectInput, questions_json: parsedQuestions }, { onConflict: 'subject' });

                if (!error) {
                    alert(`Success! Successfully processed and committed ${parsedQuestions.length} programs to node.`);
                    setTimeout(() => { window.location.reload(); }, 600);
                } else {
                    alert("Database Write Exception: " + error.message);
                }
            } catch (err) {
                alert("Core network synchronization fault.");
            } finally {
                uploadBtn.innerText = "Save / Update Subject in Database";
                uploadBtn.disabled = false;
            }
        }

        function logoutAdminSession() {
            localStorage.clear();
            window.location.replace("admin-login.html");
        }
    </script>
</body>
</html>
