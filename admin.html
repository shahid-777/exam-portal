<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Admin Control Terminal — Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen text-slate-200 flex flex-col justify-between">

    <header class="w-full bg-slate-950/60 border-b border-white/5 py-4 px-6 flex items-center justify-between shadow-lg sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <img src="logo.png" alt="Logo" class="h-8 bg-white/95 p-1 rounded-xl" onerror="this.style.display='none'">
            <span class="text-sm font-black tracking-widest text-red-400 uppercase">ROOT CENTRAL MONITOR</span>
        </div>
        <button onclick="logout()" class="bg-white/5 hover:bg-red-500/10 border border-white/10 text-xs font-bold py-2 px-4 rounded-xl cursor-pointer">Exit Terminal</button>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8 space-y-8" id="admin-main-workspace">
        <div>
            <h1 class="text-2xl font-black text-white uppercase tracking-wide">Master Control Console</h1>
            <p class="text-xs text-slate-400 font-mono mt-1">Deploy new structures or map existing exams into multiple dynamic categories.</p>
        </div>

        <!-- 💰 NEW SUBSCRIPTION CONTROLLER SECTION -->
        <div class="bg-slate-950/40 border border-emerald-500/20 rounded-2xl p-6 space-y-4 shadow-xl">
            <h3 class="text-xs font-mono font-black text-emerald-400 uppercase tracking-widest">💰 Student Subscription Manual Controller</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-mono text-slate-400 uppercase mb-1">Student Email for Unlock</label>
                    <input type="email" id="unlock-email-input" placeholder="student@example.com" class="w-full border border-white/10 p-2.5 text-xs rounded-xl bg-slate-900 text-white outline-none">
                </div>
                <div class="flex items-end">
                    <button onclick="manualUnlockStudent()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-2.5 px-4 rounded-xl text-[11px] uppercase transition">
                        Grant Subscription Access
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-slate-950/40 border border-white/5 rounded-2xl p-5 space-y-4 relative overflow-hidden h-fit shadow-xl">
                    <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-red-500 to-orange-500"></div>
                    <h3 class="text-xs font-mono font-black text-slate-400 uppercase tracking-widest">1. Create Category Manually</h3>
                    <div class="space-y-3 pt-2">
                        <input type="text" id="new-cat-name" placeholder="e.g. Patwari, REET" class="w-full border border-white/10 p-2.5 text-xs rounded-xl bg-slate-900 text-white outline-none">
                        <button onclick="createNewCategory()" class="w-full bg-gradient-to-r from-red-600 to-orange-600 text-white font-black py-2.5 px-4 rounded-xl text-[11px] uppercase">Deploy Category</button>
                    </div>
                </div>
                
                <div class="bg-slate-950/40 border border-white/5 rounded-2xl p-5 space-y-4 relative overflow-hidden h-fit shadow-xl">
                    <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-purple-500 to-pink-500"></div>
                    <h3 class="text-xs font-mono font-black text-purple-400 uppercase tracking-widest">⚡ User Access Management</h3>
                    <button onclick="openUsersActivityModal()" class="w-full flex items-center justify-between border border-purple-500/20 bg-purple-500/5 hover:bg-purple-500/10 text-purple-300 font-bold py-3.5 px-4 rounded-xl text-xs uppercase">
                        Fetch Users Info Matrix
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-slate-950/40 border border-white/5 rounded-2xl p-5 space-y-4 relative overflow-hidden shadow-xl">
                <h3 class="text-xs font-mono font-black text-slate-400 uppercase tracking-widest">2. Create Exam & Inject Questions Matrix</h3>
                <!-- ... आपका बाकी Exam Creation कोड यहाँ है ... -->
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 💰 NEW: Subscription Unlock Function
        async function manualUnlockStudent() {
            const email = document.getElementById('unlock-email-input').value.trim();
            if (!email) { alert("Please enter a valid student email."); return; }

            try {
                const { error } = await supabaseClient
                    .from('subscriptions')
                    .upsert({ 
                        user_email: email, 
                        is_active: true, 
                        expiry_date: new Date(new Date().setFullYear(new Date().getFullYear() + 1)).toISOString() 
                    });

                if (error) throw error;
                alert("✅ Access granted successfully for: " + email);
                document.getElementById('unlock-email-input').value = "";
            } catch (err) {
                alert("Error granting access: " + err.message);
            }
        }

        // ... (बाकी आपके पुराने functions जैसे createNewCategory, logout, आदि यहाँ नीचे रखें) ...
        function logout() { localStorage.clear(); window.location.replace("admin-login.html"); }
    </script>
</body>
</html>
