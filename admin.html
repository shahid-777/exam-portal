<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Console - Admin Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <header class="bg-gray-900 text-white px-8 py-5 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-black tracking-wider text-blue-400">ADMIN CONTROL CENTER (EDIT & POST)</h1>
        <a href="index.php" class="font-bold text-sm bg-gray-800 px-5 py-2.5 rounded-xl hover:bg-gray-700 border border-gray-700 transition">Exit Session</a>
    </header>

    <main class="p-6 max-w-4xl mx-auto mt-8">
        <div class="bg-white p-8 rounded-2xl shadow-md border border-gray-200 space-y-6">
            <h2 class="text-xl font-black text-gray-800">Add or Edit Subject Question Banks</h2>
            
            <div class="flex flex-col sm:flex-row gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Select Existing Subject to Edit</label>
                    <select id="admin-select-subject" class="w-full border-2 p-3 rounded-xl bg-gray-50 outline-none font-semibold text-gray-700">
                        <option value="">-- Select a subject --</option>
                    </select>
                </div>
                <button id="fetch-btn" onclick="fetchSubjectForEditing()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition shadow active:scale-95">
                    Fetch Current MCQs
                </button>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Subject Target Context (New or Selected)</label>
                <input type="text" id="admin-subject" placeholder="e.g., Operating Systems" class="w-full border-2 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-semibold">
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-bold text-gray-700">Paste / Edit Raw Text MCQs</label>
                    <span class="text-xs text-gray-400 font-mono">Format: 1. Question [New Line] A) Opt [New Line] Answer: A</span>
                </div>
                <textarea id="admin-paste-area" rows="14" placeholder="1. Which component manages computer memory?&#10;A) Kernel&#10;B) Processor&#10;C) Hard Disk&#10;D) Browser&#10;Answer: A" class="w-full border-2 p-3 rounded-xl font-mono text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>

            <button id="upload-btn" onclick="parseAndUpload()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-6 rounded-xl transition shadow-lg uppercase text-sm tracking-wide active:scale-[0.99]">
                Save / Update Subject in SQL
            </button>
        </div>
    </main>

    <script>
        // Load subjects into dropdown on page load
        window.onload = function() {
            fetch('api.php?action=get_all_exams')
            .then(res => {
                if(!res.ok) throw new Error();
                return res.json();
            })
            .then(data => {
                const select = document.getElementById('admin-select-subject');
                if(Array.isArray(data)) {
                    data.forEach(sub => {
                        let opt = document.createElement('option');
                        opt.value = sub;
                        opt.innerHTML = sub;
                        select.appendChild(opt);
                    });
                }
            })
            .catch(() => console.log("Dropdown initialization sync pending dynamic queries."));
        }

        // Fetch existing questions from database and format them back to standard raw text
        function fetchSubjectForEditing() {
            const selectedSubject = document.getElementById('admin-select-subject').value;
            if(!selectedSubject) {
                alert("Please select a subject first.");
                return;
            }

            const fetchBtn = document.getElementById('fetch-btn');
            document.getElementById('admin-subject').value = selectedSubject;
            const textArea = document.getElementById('admin-paste-area');
            
            fetchBtn.innerText = "Fetching...";
            fetchBtn.disabled = true;
            textArea.value = "Loading questions securely from SQL database...";

            fetch(`api.php?action=get_exam&subject=${encodeURIComponent(selectedSubject)}`)
            .then(res => res.json())
            .then(data => {
                fetchBtn.innerText = "Fetch Current MCQs";
                fetchBtn.disabled = false;

                if (data.status === 'success' && Array.isArray(data.questions)) {
                    let formattedText = "";
                    data.questions.forEach((q, index) => {
                        formattedText += `${index + 1}. ${q.question}\n`;
                        const labels = ['A', 'B', 'C', 'D'];
                        
                        if(Array.isArray(q.options)) {
                            q.options.forEach((opt, oIdx) => {
                                formattedText += `${labels[oIdx] || 'A'}) ${opt}\n`;
                            });
                        }
                        
                        const correctLetter = labels[parseInt(q.correct, 10)] || 'A';
                        formattedText += `Answer: ${correctLetter}\n\n`;
                    });
                    textArea.value = formattedText.trim();
                } else {
                    alert("Failed to fetch questions or paper structure is blank.");
                    textArea.value = "";
                }
            })
            .catch(() => {
                fetchBtn.innerText = "Fetch Current MCQs";
                fetchBtn.disabled = false;
                alert("Error connecting to database transmission engine.");
                textArea.value = "";
            });
        }

        // Parse structured raw text blocks and pipe array elements to SQL
        function parseAndUpload() {
            const subject = document.getElementById('admin-subject').value.trim();
            const rawText = document.getElementById('admin-paste-area').value.trim();
            const uploadBtn = document.getElementById('upload-btn');

            if(!subject || !rawText) {
                alert("Please complete both the Subject Title and Question Area console text entries.");
                return;
            }

            const questionsArray = [];
            // Split questions by double newlines safely supporting cross platform CR/LF entries
            const blocks = rawText.split(/\r?\n\s*\r?\n/);

            blocks.forEach((block) => {
                const lines = block.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length < 3) return;

                let questionText = "";
                let options = [];
                let correctIndex = -1;

                lines.forEach((line) => {
                    if (/^\d+[\s\.)]/.test(line)) {
                        questionText = line.replace(/^\d+[\s\.)]+/, '').trim();
                    }
                    else if (/^[A-D][\s\.)\-]/i.test(line)) {
                        const optionCleaned = line.replace(/^[A-D][\s\.)\-]+/i, '').trim();
                        options.push(optionCleaned);
                    }
                    else if (/^(Answer|Correct|Ans|A)[:\s\-]+([A-D])/i.test(line)) {
                        const match = line.match(/^(Answer|Correct|Ans|A)[:\s\-]+([A-D])/i);
                        if (match && match[2]) {
                            const letter = match[2].toUpperCase();
                            correctIndex = letter.charCodeAt(0) - 65; // Normalizes character index mappings mapping A->0, B->1
                        }
                    }
                });

                // Validation Guard clause: Filter and enforce structured items mapping schema structures safely
                if (questionText && options.length > 0 && correctIndex !== -1) {
                    questionsArray.push({
                        question: questionText,
                        options: options,
                        correct: parseInt(correctIndex, 10)
                    });
                }
            });

            if (questionsArray.length === 0) {
                alert("Parsing Exception Error: Formatting structure rules check failed. Verify template formats match ('Answer: A') configurations correctly.");
                return;
            }

            // Set loading interface metrics during API flight transitions
            uploadBtn.innerText = "Transmitting To Server Backend Engine...";
            uploadBtn.disabled = true;

            fetch('api.php?action=upload_exam', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subject: subject, questions: questionsArray })
            })
            .then(res => res.json())
            .then(data => {
                uploadBtn.innerText = "Save / Update Subject in SQL";
                uploadBtn.disabled = false;

                if(data.status === 'success') {
                    alert(`Successfully updated "${subject}" with ${questionsArray.length} valid MCQs compiled directly inside the database array!`);
                    location.reload();
                } else {
                    alert("Database write rejected constraint check: " + data.message);
                }
            })
            .catch(() => {
                uploadBtn.innerText = "Save / Update Subject in SQL";
                uploadBtn.disabled = false;
                alert("Fatal connection loop timeout error during script execution processing routing.");
            });
        }
    </script>
</body>
</html>
