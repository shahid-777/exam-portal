<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // 🛡️ EXCLUSIVE ADMINISTRATIVE ROUTE GUARD & TIMEOUT INTERCEPTOR
        (function() {
            // Admin specific keys fetch loop
            const adminEmail = localStorage.getItem('adminEmail');
            const adminLoginTime = localStorage.getItem('adminSessionTime');
            
            // --- LAYER 1: ABSOLUTE ACCESS PROTECTION ---
            if (!adminEmail || !adminLoginTime) {
                localStorage.clear();
                alert("Access Denied: Administrative terminal requires official authorization key.");
                window.location.replace("admin-login.html"); // Redirects back to primary authentication matrix
                return;
            }

            // --- LAYER 2: EMAIL PROFILE VERIFICATION ---
            const OFFICIAL_ADMIN_EMAIL = "shahid.gauri2@gmail.com"; 

            if (adminEmail.toLowerCase() !== OFFICIAL_ADMIN_EMAIL.toLowerCase()) {
                alert("Security Breach: Your current active account token is not authorized to access the Admin Panel.");
                window.location.replace("dashboard.html"); // Drop malicious/student tokens back to standard interface
                return;
            }

            // --- LAYER 3: HARD LIFESPAN EXPIRY CHECK (1 Hour Timeout) ---
            const currentTimestamp = Date.now();
            const oneHourInMs = 1 * 60 * 60 * 1000; 

            if (currentTimestamp - parseInt(adminLoginTime, 10) > oneHourInMs) {
                localStorage.clear();
                alert("Admin Session Expired: Please re-authenticate via secure entry gateway.");
                window.location.replace("index.html");
                return;
            }
            console.log("Root Guard clearance status: SECURE");
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Management Console - Admin Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <header class="bg-gray-900 text-white px-4 sm:px-8 py-4 flex flex-col sm:flex-row gap-3 justify-between items-center shadow-lg text-center sm:text-left">
        <h1 class="text-lg sm:text-xl font-black tracking-wider text-blue-400 uppercase">ADMIN CONTROL CENTER</h1>
        <button onclick="logoutAdminSession()" class="w-full sm:w-auto text-center font-bold text-xs bg-gray-800 px-5 py-2.5 rounded-xl hover:bg-gray-700 border border-gray-700 transition">Exit Session</button>
    </header>

    <main class="p-4 sm:p-6 max-w-4xl mx-auto">
        <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-md border border-gray-200 space-y-5 sm:space-y-6">
            <h2 class="text-lg sm:text-xl font-black text-gray-800 uppercase tracking-wide">Add or Edit Subject Question Banks</h2>
            
            <div class="flex flex-col sm:flex-row gap-3 items-end">
                <div class="w-full flex-1">
                    <label class="block text-xs sm:text-sm font-bold text-gray-700 mb-1.5">Select Existing Subject to Edit</label>
                    <select id="admin-select-subject" class="w-full border-2 p-3 text-sm rounded-xl bg-gray-50 outline-none font-semibold text-gray-700">
                        <option value="">-- Select a subject --</option>
                    </select>
                </div>
                <button id="fetch-btn" onclick="fetchSubjectForEditing()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-3.5 px-6 rounded-xl transition shadow active:scale-95 whitespace-nowrap">
                    Fetch MCQs
                </button>
            </div>

            <div>
                <label class="block text-xs sm:text-sm font-bold text-gray-700 mb-1.5">Subject Target Context</label>
                <input type="text" id="admin-subject" placeholder="e.g., Operating System" class="w-full border-2 p-3 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-gray-800">
            </div>

            <div>
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1 mb-1.5">
                    <label class="block text-xs sm:text-sm font-bold text-gray-700">Paste / Edit Raw Text MCQs</label>
                    <span class="text-[10px] text-gray-400 font-mono">Format: 1. Question \n A) Opt \n Answer: A</span>
                </div>
                <textarea id="admin-paste-area" rows="12" placeholder="1. Which component manages computer memory?&#10;A) Kernel&#10;B) Processor&#10;Answer: A" class="w-full border-2 p-3 rounded-xl font-mono text-xs sm:text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none text-gray-800"></textarea>
            </div>

            <button id="upload-btn" onclick="handleMCQUploadProcess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-6 rounded-xl transition duration-200 shadow-lg uppercase text-xs sm:text-sm tracking-wide active:scale-[0.99]">
                Save / Update Subject in Database
            </button>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function() {
            try {
                const { data } = await supabaseClient.from('exams').select('subject');
                const select = document.getElementById('admin-select-subject');
                if(data) {
                    data.forEach(row => {
                        let opt = document.createElement('option');
                        opt.value = row.subject; opt.innerHTML = row.subject;
                        select.appendChild(opt);
                    });
                }
            } catch (err) { console.log("Init sequence completed."); }
        }

        async function fetchSubjectForEditing() {
            const selectedSubject = document.getElementById('admin-select-subject').value;
            if(!selectedSubject) { alert("Please select a subject first."); return; }
            const fetchBtn = document.getElementById('fetch-btn');
            document.getElementById('admin-subject').value = selectedSubject;
            const textArea = document.getElementById('admin-paste-area');
            
            fetchBtn.innerText = "Fetching..."; fetchBtn.disabled = true;
            try {
                const { data } = await supabaseClient.from('exams').select('questions_json').eq('subject', selectedSubject).single();
                fetchBtn.innerText = "Fetch MCQs"; fetchBtn.disabled = false;
                if (data && Array.isArray(data.questions_json)) {
                    let text = "";
                    data.questions_json.forEach((q, idx) => {
                        text += `${idx + 1}. ${q.question}\n`;
                        const lbls = ['A', 'B', 'C', 'D'];
                        if(Array.isArray(q.options)) q.options.forEach((o, oId) => { text += `${lbls[oId] || 'A'}) ${o}\n`; });
                        text += `Answer: ${lbls[parseInt(q.correct, 10)] || 'A'}\n\n`;
                    });
                    textArea.value = text.trim();
                }
            } catch (err) { fetchBtn.innerText = "Fetch MCQs"; fetchBtn.disabled = false; }
        }

        function parseRawMCQs(rawText) {
            const lines = rawText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            const questionsArray = [];
            let currentQuestion = null;
            const lbls = ['A', 'B', 'C', 'D'];

            lines.forEach(line => {
                const questionMatch = line.match(/^(\d+)[\s.)-]+(.*)/);
                
                if (questionMatch) {
                    if (currentQuestion && currentQuestion.options.length >= 2 && currentQuestion.correct !== undefined) {
                        questionsArray.push(currentQuestion);
                    }
                    currentQuestion = {
                        question: questionMatch[2].trim(),
                        options: [],
                        correct: 0
                    };
                } 
                else if (line.match(/^[A-D][\s.)-]+/i)) {
                    if (currentQuestion) {
                        const optionText = line.replace(/^[A-D][\s.)-]+/i, '').trim();
                        currentQuestion.options.push(optionText);
                    }
                } 
                else if (line.toLowerCase().startsWith('answer:') || line.toLowerCase().startsWith('ans:')) {
                    if (currentQuestion) {
                        const ansLetter = line.split(':')[1].trim().toUpperCase();
                        const indexMapping = lbls.indexOf(ansLetter);
                        currentQuestion.correct = indexMapping !== -1 ? indexMapping : 0;
                    }
                }
            });

            if (currentQuestion && currentQuestion.options.length >= 2 && currentQuestion.correct !== undefined) {
                questionsArray.push(currentQuestion);
            }

            return questionsArray;
        }

        async function handleMCQUploadProcess() {
            const subjectInput = document.getElementById('admin-subject').value.trim();
            const rawText = document.getElementById('admin-paste-area').value.trim(); 
            const uploadBtn = document.getElementById('upload-btn');

            if (!subjectInput) { alert("Please input or select a Target Subject."); return; }
            if (!rawText) { alert("Textarea is empty. Please supply or edit target questions."); return; }

            const parsedQuestions = parseRawMCQs(rawText);

            if (parsedQuestions.length === 0) {
                alert("Parsing format mismatch validation alert: Format thik karein ya text check karein.");
                return;
            }

            uploadBtn.innerText = "Synchronizing Node Records...";
            uploadBtn.disabled = true;

            try {
                const { error } = await supabaseClient
                    .from('exams')
                    .upsert({ 
                        subject: subjectInput, 
                        questions_json: parsedQuestions 
                    }, { onConflict: 'subject' });

                if (error) {
                    alert("Database write error: " + error.message);
                } else {
                    alert(`Success! Successfully processed and committed ${parsedQuestions.length} items to database.`);
                    setTimeout(() => { window.location.reload(); }, 600);
                }
            } catch (err) {
                alert("Core network timeout framework exception.");
            } finally {
                uploadBtn.innerText = "Save / Update Subject in Database";
                uploadBtn.disabled = false;
            }
        }

        // 🚪 CLEAR INSTANT SESSION LOGOUT SYSTEM FOR ADMIN ENTITY
        function logoutAdminSession() {
            localStorage.clear();
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
