<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Live Examination Engine — Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 font-sans min-h-screen text-slate-200 flex flex-col justify-between select-none">

    <header class="w-full bg-slate-900/60 backdrop-blur-md border-b border-white/5 py-4 px-6 flex items-center justify-between shadow-lg sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="bg-white/95 p-1 rounded-xl shrink-0">
                <img src="logo.png" alt="Logo" class="h-8 w-auto object-contain" onerror="this.style.display='none'">
            </div>
            <div class="flex flex-col">
                <span id="live-subject-title" class="text-xs font-black tracking-widest text-blue-400 uppercase leading-none">LOADING ASSESSMENT...</span>
                <span class="text-[8px] font-mono font-bold text-slate-500 uppercase tracking-wider mt-0.5">SECURE RUNTIME MONITOR</span>
            </div>
        </div>
        
        <div class="bg-red-500/10 border border-red-500/20 px-4 py-1.5 rounded-xl flex items-center space-x-2">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
            <span id="time-counter-clock" class="text-xs font-mono font-black text-red-400 tracking-widest">00:00</span>
        </div>
    </header>

    <section class="w-full bg-slate-900/30 border-b border-white/5 py-3 px-6 sticky top-[65px] z-40 backdrop-blur-sm">
        <div class="max-w-7xl mx-auto flex flex-wrap gap-4 items-center justify-between text-xs font-mono">
            <div class="flex items-center space-x-6">
                <div>Total Questions: <span id="stat-total" class="text-blue-400 font-bold">0</span></div>
                <div>Attempted: <span id="stat-attempted" class="text-green-400 font-bold">0</span></div>
                <div>Marked for Review: <span id="stat-marked" class="text-yellow-400 font-bold">0</span></div>
                <div>Unattempted: <span id="stat-left" class="text-slate-400 font-bold">0</span></div>
            </div>
        </div>
    </section>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-3 space-y-6">
            <div id="questions-pipeline-wrapper" class="space-y-6">
                <div class="text-center text-slate-500 font-mono text-xs py-12 animate-pulse uppercase">
                    Compiling Objective Array Matrices...
                </div>
            </div>

            <div class="pt-4 border-t border-white/5 flex justify-end">
                <button onclick="terminateAssessmentProcess()" class="bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white font-black py-3 px-8 rounded-xl shadow-xl uppercase text-xs tracking-widest transition transform active:scale-[0.99] cursor-pointer">
                    Submit Test Evaluation
                </button>
            </div>
        </div>

        <div class="bg-slate-900/40 border border-white/5 rounded-2xl p-5 h-fit sticky top-[130px] space-y-4 shadow-xl">
            <div class="border-b border-white/5 pb-2">
                <h4 class="text-xs font-mono font-black text-slate-400 uppercase tracking-widest">Question Palette</h4>
                <p class="text-[9px] text-slate-500 font-mono mt-0.5">Quick Navigation Cluster</p>
            </div>
            
            <div id="palette-grid-buttons" class="grid grid-cols-5 gap-2">
                </div>

            <div class="pt-2 border-t border-white/5 space-y-1.5 text-[10px] font-mono text-slate-400">
                <div class="flex items-center space-x-2"><span class="w-3 h-3 bg-slate-800 border border-white/10 rounded"></span> <span>Unvisited / Unattempted</span></div>
                <div class="flex items-center space-x-2"><span class="w-3 h-3 bg-green-600 rounded"></span> <span>Attempted</span></div>
                <div class="flex items-center space-x-2"><span class="w-3 h-3 bg-yellow-500 rounded"></span> <span>Marked for Review</span></div>
            </div>
        </div>

    </main>

    <footer class="w-full text-center py-3 border-t border-white/5 bg-slate-900/40 text-[9px] font-mono text-slate-600 uppercase tracking-widest">
        &copy; Computer Science Management System Terminal
    </footer>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let globalLoadedQuestions = [];
        let networkTimerInterval = null;
        
        let userResponses = {}; 
        let markedForReviewSet = new Set();

        window.onload = function() {
            // 🚨 VALIDATION CLEARANCE: Check both user and admin configurations safely
            const studentSession = localStorage.getItem('userEmail');
            const adminSession = localStorage.getItem('adminEmail');

            if(!studentSession && !adminSession) { 
                console.warn("No active authorization token detected.");
                window.location.replace("index.html"); 
                return; 
            }

            const urlParams = new URLSearchParams(window.location.search);
            const targetSubject = urlParams.get('subject');

            if(!targetSubject) { 
                window.location.replace("dashboard.html"); 
                return; 
            }
            
            streamTargetExamJson(decodeURIComponent(targetSubject));
        };

        // 🔄 FETCH DATA FROM 'EXAMS' BY EXACT SUBJECT MATCHING
        async function streamTargetExamJson(subjectName) {
            try {
                const { data, error } = await supabaseClient
                    .from('exams')
                    .select('subject, questions_json, duration_minutes')
                    .eq('subject', subjectName)
                    .limit(1)
                    .maybeSingle();

                if (error || !data) throw new Error("Data retrieval interruption.");

                document.getElementById('live-subject-title').innerText = data.subject.toUpperCase();
                
                globalLoadedQuestions = typeof data.questions_json === 'string' ? JSON.parse(data.questions_json) : data.questions_json;
                
                renderAssessmentLayout(globalLoadedQuestions);
                renderNavigationPalette(globalLoadedQuestions.length);
                updateLiveStatusCounters();
                initializeRuntimeClock(parseInt(data.duration_minutes) || 60);

            } catch (err) {
                document.getElementById('questions-pipeline-wrapper').innerHTML = `
                    <div class="text-center font-mono text-xs text-red-400 border border-red-500/10 p-6 rounded-2xl bg-red-500/5">
                        Exception caught: Failed to render test objects from 'questions_json'.
                    </div>`;
            }
        }

        function renderAssessmentLayout(questions) {
            const container = document.getElementById('questions-pipeline-wrapper');
            container.innerHTML = "";

            if(!questions || questions.length === 0) {
                container.innerHTML = `<div class="text-center font-mono text-xs text-slate-600 py-6">Question array sequence empty.</div>`;
                return;
            }

            questions.forEach((q, index) => {
                let optionsHtml = "";
                
                // Support options strings array standard structure securely
                const optionsArray = q.options || [];
                
                optionsArray.forEach((opt, optIdx) => {
                    optionsHtml += `
                        <label class="flex items-center space-x-3 bg-slate-900/40 hover:bg-slate-900/80 border border-white/5 hover:border-blue-500/20 p-3.5 rounded-xl cursor-pointer transition">
                            <input type="radio" name="question-${index}" value="${optIdx}" onchange="registerRadioResponse(${index}, ${optIdx})" class="w-4 h-4 text-blue-600 bg-slate-950 border-white/10 focus:ring-blue-500/40">
                            <span class="text-xs text-slate-300 font-medium">${opt}</span>
                        </label>
                    `;
                });

                // Target structure container
                const questionText = q.title || q.question || 'Objective Question';

                container.innerHTML += `
                    <div id="question-card-${index}" class="bg-slate-900/20 border border-white/5 p-5 sm:p-6 rounded-2xl space-y-4 shadow-xl scroll-mt-36">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex items-start space-x-3">
                                <span class="text-xs font-mono font-black text-blue-400 bg-blue-500/10 px-2.5 py-1 rounded-md">Q. ${index + 1}</span>
                                <h4 class="text-sm font-bold text-slate-100 tracking-wide pt-0.5 leading-relaxed">${questionText}</h4>
                            </div>
                            <button onclick="toggleMarkForReview(${index})" id="mark-btn-${index}" class="text-[10px] font-mono border border-white/10 hover:border-yellow-500/40 bg-white/5 px-2.5 py-1 rounded-lg text-slate-400 hover:text-yellow-400 transition shrink-0">
                                Mark Review
                            </button>
                        </div>
                        <div class="grid grid-cols-1 gap-2.5 pt-1">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });
        }

        function renderNavigationPalette(totalCount) {
            const grid = document.getElementById('palette-grid-buttons');
            grid.innerHTML = "";
            for (let i = 0; i < totalCount; i++) {
                grid.innerHTML += `
                    <button onclick="scrollToQuestion(${i})" id="palette-btn-${i}" class="bg-slate-800 border border-white/5 text-slate-400 font-mono text-xs font-bold py-2 rounded-lg hover:bg-slate-700 transition cursor-pointer text-center">
                        ${i + 1}
                    </button>
                `;
            }
        }

        function registerRadioResponse(qIdx, optIdx) {
            userResponses[qIdx] = optIdx;
            updateLiveStatusCounters();
            
            const pBtn = document.getElementById(`palette-btn-${qIdx}`);
            if(!markedForReviewSet.has(qIdx)) {
                pBtn.className = "bg-green-600 text-white font-mono text-xs font-bold py-2 rounded-lg transition text-center cursor-pointer";
            }
        }

        function toggleMarkForReview(qIdx) {
            const mBtn = document.getElementById(`mark-btn-${qIdx}`);
            const pBtn = document.getElementById(`palette-btn-${qIdx}`);
            
            if (markedForReviewSet.has(qIdx)) {
                markedForReviewSet.delete(qIdx);
                mBtn.classList.remove("border-yellow-500/50", "text-yellow-400", "bg-yellow-500/10");
                
                if (userResponses[qIdx] !== undefined) {
                    pBtn.className = "bg-green-600 text-white font-mono text-xs font-bold py-2 rounded-lg transition text-center cursor-pointer";
                } else {
                    pBtn.className = "bg-slate-800 border border-white/5 text-slate-400 font-mono text-xs font-bold py-2 rounded-lg transition text-center cursor-pointer";
                }
            } else {
                markedForReviewSet.add(qIdx);
                mBtn.classList.add("border-yellow-500/50", "text-yellow-400", "bg-yellow-500/10");
                pBtn.className = "bg-yellow-500 text-slate-950 font-mono text-xs font-black py-2 rounded-lg transition text-center cursor-pointer";
            }
            updateLiveStatusCounters();
        }

        function scrollToQuestion(qIdx) {
            const el = document.getElementById(`question-card-${qIdx}`);
            if(el) el.scrollIntoView({ behavior: 'smooth' });
        }

        function updateLiveStatusCounters() {
            const total = globalLoadedQuestions.length;
            const attempted = Object.keys(userResponses).length;
            const marked = markedForReviewSet.size;
            const unattempted = total - attempted;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-attempted').innerText = attempted;
            document.getElementById('stat-marked').innerText = marked;
            document.getElementById('stat-left').innerText = unattempted;
        }

        function initializeRuntimeClock(minutes) {
            let totalSeconds = minutes * 60;
            const clock = document.getElementById('time-counter-clock');

            networkTimerInterval = setInterval(() => {
                let min = Math.floor(totalSeconds / 60);
                let sec = totalSeconds % 60;

                clock.innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
                
                if (totalSeconds <= 0) {
                    clearInterval(networkTimerInterval);
                    terminateAssessmentProcess();
                }
                totalSeconds--;
            }, 1000);
        }

        function terminateAssessmentProcess() {
            clearInterval(networkTimerInterval);
            let absoluteScore = 0;

            globalLoadedQuestions.forEach((q, index) => {
                const selectedOpt = userResponses[index];
                if (selectedOpt !== undefined) {
                    if (parseInt(selectedOpt) === parseInt(q.correct)) {
                        absoluteScore++;
                    }
                }
            });

            alert(`Evaluation compiled successfully!\nYour score: ${absoluteScore} Out of ${globalLoadedQuestions.length}`);
            window.location.replace("dashboard.html");
        }
    </script>
</body>
</html>
