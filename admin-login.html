<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="rounded" rel="icon" type="image/png" href="logo.png">
    <title>Admin Gateway Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-950 max-w-sm w-full p-6 sm:p-8 rounded-2xl shadow-2xl border-2 border-red-500/20 space-y-6 relative overflow-hidden">
        
        <div class="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-red-600 to-orange-500"></div>

        <div class="space-y-1 text-center">
            <h2 class="text-xl font-black text-slate-100 uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">
                ADMIN CONSOLE GATEWAY
            </h2>
            <p class="text-[10px] text-slate-500 font-mono tracking-wide">
                Restricted area. Authorized credentials verification cluster.
            </p>
        </div>

        <div class="space-y-4 pt-2">
            <div>
                <label class="block text-[10px] font-mono font-black text-slate-400 uppercase tracking-wider mb-1.5">
                    Admin Security Email
                </label>
                <input type="email" id="admin-email" placeholder="admin@gmail.com" class="w-full border border-slate-800 p-3 text-sm rounded-xl font-semibold bg-slate-900 text-slate-200 outline-none focus:border-red-500/50 transition">
            </div>

            <div>
                <label class="block text-[10px] font-mono font-black text-slate-400 uppercase tracking-wider mb-1.5">
                    Master Password
                </label>
                <input type="password" id="admin-password" placeholder="••••••••" class="w-full border border-slate-800 p-3 text-sm rounded-xl font-semibold bg-slate-900 text-slate-200 outline-none focus:border-red-500/50 transition">
            </div>

            <button id="auth-btn" onclick="handleAdminLogin()" class="w-full bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white font-black py-3.5 px-4 rounded-xl shadow-lg uppercase text-xs tracking-widest transition transform active:scale-[0.98] mt-2">
                Authorize Session
            </button>
        </div>

        <div class="flex flex-col items-center justify-center space-y-2 pt-2 border-t border-slate-900 text-[11px] font-bold">
            <a href="forgot-password.html" class="text-orange-400 hover:text-orange-300 hover:underline transition flex items-center space-x-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-3.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z" /></svg>
                <span>Forgot Master Password? Recover with Google ID</span>
            </a>
            <a href="index.html" class="text-slate-500 hover:text-slate-400 transition font-mono tracking-wider text-[10px] uppercase">
                &larr; Exit Gateway Terminal
            </a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true,
                storage: window.localStorage
            }
        });

        async function handleAdminLogin() {
    const email = document.getElementById('admin-email').value.trim().toLowerCase();
    const password = document.getElementById('admin-password').value;
    const loginBtn = document.getElementById('auth-btn');

    if (!email || !password) { 
        alert("Please enter administrative credentials."); 
        return; 
    }

    try {
        if (loginBtn) {
            loginBtn.innerText = "AUTHENTICATING Privileges...";
            loginBtn.disabled = true;
        }

        // 1. ब्राउज़र का पुराना बचा हुआ सेशन साफ़ करें
        localStorage.clear();

        // 2. 🚀 सीधा पोर्टल यूजर्स टेबल को हिट करें और ईमेल, पासवर्ड, रोल तीनों एक साथ मँगाएँ
        const { data: userRecord, error: dbError } = await supabaseClient
            .from('portal_users')
            .select('email, password, role, name')
            .eq('email', email)
            .maybeSingle();

        if (dbError) throw dbError;

        // 3. 🛡️ टेबल-बेस्ड पासवर्ड और रोल का मिलान
        if (!userRecord) {
            alert("Access Denied: Administrative email not registered.");
            return;
        }

        if (userRecord.password !== password) {
            alert("Access Denied: Master Password Mismatch.");
            return;
        }

        if (userRecord.role !== 'admin') {
            alert("Access Denied: You do not possess administrative role status.");
            return;
        }

        // 4. अगर सब सही है, तो डेटाबेस में last_login टाइमस्टैम्प अपडेट करें
        const currentTimestamp = new Date().toISOString();
        await supabaseClient
            .from('portal_users')
            .update({ last_login: currentTimestamp })
            .eq('email', email);

        // 5. लोकल स्टोरेज में एडमिन की फ्रेश स्टेट इंजेक्ट करें (ताकि admin.html इसे पहचान सके)
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userRole', 'admin');
        localStorage.setItem('adminAuthenticated', 'true');
        
        // 6. सुरक्षित रूट पर रीडायरेक्ट करें
        window.location.replace("admin.html");

    } catch (err) {
        alert("Gateway Authentication Fault: " + (err.message || JSON.stringify(err)));
    } finally {
        if (loginBtn) {
            loginBtn.innerText = "Authorize Session";
            loginBtn.disabled = false;
        }
    }
}

    </script>
</body>
</html>
