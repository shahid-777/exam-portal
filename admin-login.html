<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Secure Admin Authentication Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen font-sans px-4">

    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-red-900/50 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-600 via-orange-500 to-red-600"></div>
        
        <h1 class="text-2xl font-black text-red-500 mb-2 tracking-wider text-center uppercase">ADMIN CONSOLE GATEWAY</h1>
        <p id="admin-status-msg" class="text-gray-400 mb-6 text-xs text-center font-mono">Restricted area. Authorized credentials verification cluster.</p>
        
        <form id="admin-login-form" class="space-y-4" autocomplete="off">
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wider">Admin Security Email</label>
                <input type="email" id="admin-email" name="secure_admin_email_field" autocomplete="one-time-code" placeholder="admin@gmail.com" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 font-mono text-white placeholder-slate-600">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wider">Master Password</label>
                <input type="password" id="admin-password" required placeholder="••••••••" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 font-mono text-white placeholder-slate-600">
            </div>
            
            <button type="submit" id="admin-btn" class="w-full bg-red-700 hover:bg-red-600 text-white font-black py-3.5 rounded-xl transition uppercase text-xs tracking-widest shadow-md shadow-red-950">
                Authorize Session
            </button>

            <div class="text-right mt-2">
                <button type="button" onclick="triggerAdminRecovery()" class="text-xs text-red-400 hover:underline font-bold tracking-wide">
                    Request Secure OTP / Reset Link
                </button>
            </div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const statusText = document.getElementById('admin-status-msg');

        document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;
            const btn = document.getElementById('admin-btn');

            statusText.innerText = "Verifying Clearance...";
            statusText.className = "text-blue-400 mb-6 text-xs text-center font-mono";
            btn.disabled = true;

            try {
                const { data: dbUser, error: dbError } = await supabaseClient
                    .from('portal_users')
                    .select('*')
                    .eq('email', email);

                if (dbError) {
                    statusText.innerText = "Database Node Error: " + dbError.message;
                    statusText.className = "text-red-500 mb-6 text-xs text-center font-mono";
                    resetForm(); return;
                }

                const adminRecord = (dbUser && dbUser.length > 0) ? dbUser[0] : null;

                if (!adminRecord || adminRecord.role !== 'admin') {
                    statusText.innerText = "Security Exception: Access denied. Profile match not found.";
                    statusText.className = "text-red-500 mb-6 text-xs text-center font-mono";
                    resetForm(); return;
                }

                if (adminRecord.password !== password) {
                    statusText.innerText = "Authentication Failure: Master password incorrect.";
                    statusText.className = "text-red-500 mb-6 text-xs text-center font-mono";
                    resetForm(); return;
                }

                statusText.innerText = "Clearance Granted. Redirecting...";
                statusText.className = "text-green-500 mb-6 text-xs text-center font-mono";
                
                // 🔑 LOCKED UPDATED SECURITY SEED MODULES (Matching the new Admin Guard script)
                localStorage.setItem('adminEmail', adminRecord.email);
                localStorage.setItem('adminUserName', adminRecord.name);
                localStorage.setItem('adminSessionTime', Date.now().toString());
                
                window.location.href = "admin.html";

            } catch (err) { 
                statusText.innerText = "Matrix core system exception during validation.";
                statusText.className = "text-red-500 mb-6 text-xs text-center font-mono";
                resetForm(); 
            }

            function resetForm() {
                btn.disabled = false;
                btn.innerText = "Authorize Session";
            }
        });

        function triggerAdminRecovery() {
            const email = document.getElementById('admin-email').value.trim();
            if(!email) { 
                statusText.innerText = "Notice: Please type your admin email ID first in the field above.";
                statusText.className = "text-yellow-500 mb-6 text-xs text-center font-mono";
                return; 
            }

            localStorage.setItem('adminResetEmail', email);
            statusText.innerText = "Security redirection parameters verified. Opening validation matrix...";
            statusText.className = "text-green-500 mb-6 text-xs text-center font-mono";
            
            setTimeout(() => {
                window.location.href = "reset-password.html";
            }, 2000); // ⏱️ Reduced latency timeout from 8s to 2s for an instant smooth transition
        }
    </script>
</body>
</html>
