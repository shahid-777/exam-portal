<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <link class="rounded" rel="icon" type="image/png" href="logo.png">
    <title>Admin Gateway Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-950 max-w-sm w-full p-6 sm:p-8 rounded-2xl shadow-2xl border-2 border-red-500/20 space-y-6 relative overflow-hidden">
        
        <div class="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-red-600 to-orange-500"></div>

        <div class="space-y-1 text-center">
            <h2 class="text-xl font-black text-slate-100 uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">
                ADMIN CONSOLE GATEWAY
            </h2>
            <p class="text-[10px] text-slate-500 font-mono tracking-wide">
                Restricted area. Authorized single sign-on verification cluster.
            </p>
        </div>

        <div class="py-4 flex flex-col items-center justify-center space-y-4 bg-slate-900/40 border border-slate-800 rounded-2xl p-4">
            <span class="text-[10px] font-mono font-black text-slate-400 uppercase tracking-widest block mb-1">
                Authorized Identity Channel
            </span>
            <div class="flex justify-center transition hover:scale-[1.01] w-full max-w-full overflow-hidden">
                <div id="google-admin-auth-root" class="w-full flex justify-center"></div>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center pt-2 border-t border-slate-900 text-[11px] font-bold">
            <a href="index.html" class="text-slate-500 hover:text-slate-400 transition font-mono tracking-wider text-[10px] uppercase">
                &larr; Exit Gateway Terminal
            </a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true,
                storage: window.localStorage
            }
        });

        window.onload = function () {
            localStorage.clear(); // पुराना कचरा साफ़ करें
            
            google.accounts.id.initialize({
                client_id: "313377576458-c198ssj598dcg6c58c3kmtvtg5sf9m84.apps.googleusercontent.com", 
                callback: handleAdminGoogleCallbackRoutine,
                auto_select: false
            });
            
            google.accounts.id.renderButton(
                document.getElementById("google-admin-auth-root"),
                { theme: "filled_blue", size: "large", type: "standard", text: "signin_with", width: "280", shape: "pill" }
            );
        };

        // 🛡️ गूगल एडमिन सिंक इंजन (डेटाबेस वैरिफिकेशन + रोल लॉकिंग)
        async function handleAdminGoogleCallbackRoutine(response) {
            try {
                // 1. गूगल टोकन से सुपबेस ऑथेंटिकेट करें
                const { data, error } = await supabaseClient.auth.signInWithIdToken({
                    provider: 'google',
                    token: response.credential
                });

                if (error) throw error;

                if (data && data.session) {
                    await supabaseClient.auth.setSession(data.session);
                }

                const adminEmail = data.user.email.toLowerCase();
                const currentTimestamp = new Date().toISOString();

                // 🚀 [HARD RULE]: केवल ऑफिशियल एडमिन ईमेल को ही अंदर जाने की अनुमति
                if (adminEmail !== 'examportalcse@gmail.com') {
                    alert("Access Denied: Administrative privileges missing for this identifier.");
                    await supabaseClient.auth.signOut();
                    localStorage.clear();
                    window.location.reload();
                    return;
                }

                // 2. डेटाबेस की 'portal_users' टेबल में एडमिन रिकॉर्ड सिंक / अपडेट करें
                await supabaseClient
                    .from('portal_users')
                    .upsert({
                        email: adminEmail,
                        name: data.user.user_metadata?.full_name || "Shahid Gauri",
                        role: 'admin', // यहाँ रोल को 'admin' पर फ़ोर्स लॉक किया गया है
                        password: 'OAUTH_GOOGLE_NODE',
                        last_login: currentTimestamp
                    }, { onConflict: 'email' });

                // 3. लोकल स्टोरेज स्टेट्स सेट करके सीधे एडमिन पैनल पर भेजें
                localStorage.setItem('userEmail', adminEmail);
                localStorage.setItem('userRole', 'admin');
                localStorage.setItem('adminAuthenticated', 'true');
                
                window.location.replace("admin.html");

            } catch (err) {
                alert("Gateway Authentication Fault: " + err.message);
            }
        }
    </script>
</body>
</html>
