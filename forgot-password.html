<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Account Recovery - Secure Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #020617);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
    </style>
</head>
<body class="animate-gradient font-sans min-h-screen flex flex-col justify-between text-slate-200">

    <!-- TOP DYNAMIC HEADER BAR -->
    <header class="w-full bg-slate-950/40 backdrop-blur-md border-b border-white/5 py-4 px-6 flex items-center justify-between shadow-lg shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-white/95 p-1 rounded-xl shadow-inner shadow-black/20">
                <img src="logo.png" alt="Logo" class="h-8 w-auto object-contain">
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 uppercase leading-none">EXAM PORTAL</span>
                <span class="text-[9px] font-mono font-bold text-slate-500 tracking-wider mt-0.5 uppercase">Security Gateway</span>
            </div>
        </div>
        <div class="bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-full flex items-center space-x-2 shadow-sm">
            <span class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></span>
            <span id="gateway-mode-title" class="text-[10px] font-mono font-black text-amber-400 tracking-wider uppercase">STUDENT RECOVERY NODE</span>
        </div>
    </header>

    <!-- PREMIUM GLASSMORPHISM AUTHENTICATION WORKSPACE -->
    <main class="flex-1 flex items-center justify-center p-4 sm:p-6">
        <div class="bg-slate-900/60 backdrop-blur-xl max-w-md w-full p-6 sm:p-8 rounded-3xl shadow-2xl border border-white/10 space-y-6 relative overflow-hidden">
            
            <div id="top-glow-line" class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600"></div>

            <!-- HEADER PANEL -->
            <div class="space-y-2 text-center">
                <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-100 to-blue-400 uppercase tracking-wide">
                    ACCOUNT RECOVERY
                </h2>
                <p class="text-xs text-slate-400 font-medium">
                    Enter your registered security email to receive an official recovery link.
                </p>
            </div>

            <hr class="border-white/5">

            <!-- STEP 1: EMAIL SUBMISSION FORM -->
            <div id="request-container" class="text-left space-y-4">
                <div>
                    <label class="block text-[10px] font-mono font-black text-slate-400 uppercase tracking-wider mb-1.5">
                        Registered Email Address / Username
                    </label>
                    <input type="text" id="recovery-email" placeholder="Enter your username or email" autocomplete="off" class="w-full border border-white/10 p-3 text-sm rounded-xl font-semibold bg-slate-950/50 text-white outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/10 transition shadow-inner">
                </div>

                <button id="send-btn" onclick="handleSupabaseRecoveryRequest()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3.5 px-4 rounded-xl shadow-lg shadow-blue-600/20 uppercase text-xs tracking-wider transition transform active:scale-[0.99]">
                    Send Recovery Link
                </button>
            </div>

            <!-- STEP 2: PASSWORD RESET WORKSPACE -->
            <div id="reset-password-form" class="hidden text-left space-y-4 pt-2">
                <span class="block text-[10px] font-mono font-black text-emerald-400 uppercase tracking-wider bg-emerald-500/10 border border-emerald-500/20 p-2.5 rounded-xl text-center">
                    ✓ Secure Reset Session Verified
                </span>
                
                <div>
                    <label class="block text-[10px] font-mono font-black text-slate-400 uppercase tracking-wider mb-1.5">
                        Enter New Secure Password
                    </label>
                    <input type="password" id="new-password" placeholder="••••••••" class="w-full border border-white/10 p-3 text-sm rounded-xl font-semibold bg-slate-950/50 text-white outline-none focus:border-blue-500/50 focus:ring-2 focus:ring-blue-500/10 transition shadow-inner">
                </div>

                <button id="commit-btn" onclick="commitNewPasswordToSupabase()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3.5 px-4 rounded-xl shadow-lg shadow-emerald-600/20 uppercase text-xs tracking-wider transition transform active:scale-[0.99]">
                    Update Account Credentials
                </button>
            </div>

            <hr class="border-white/5">

            <!-- DYNAMIC BACK TO LOGIN TERMINAL LINK -->
            <div class="text-center pt-1">
                <a href="javascript:void(0);" onclick="handleBackNavigation()" class="text-slate-500 hover:text-slate-400 transition font-mono tracking-wider text-[10px] uppercase">
                    &larr; Back to Login Terminal
                </a>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="w-full text-center py-4 border-t border-white/5 bg-slate-950/20 text-[10px] font-mono font-bold text-slate-600 uppercase tracking-widest shrink-0">
        &copy; JECRC University — Examination Infrastructure Network
    </footer>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });

        window.onload = async function() {
            const isRequestFromAdmin = window.location.search.includes('source=admin');
            const modeBadge = document.getElementById('gateway-mode-title');
            const topGlow = document.getElementById('top-glow-line');

            if (isRequestFromAdmin) {
                if(modeBadge) {
                    modeBadge.innerText = "ADMIN RECOVERY NODE";
                    modeBadge.parentElement.className = "bg-red-500/10 border border-red-500/20 px-3 py-1.5 rounded-full flex items-center space-x-2 shadow-sm";
                    modeBadge.className = "text-[10px] font-mono font-black text-red-400 tracking-wider uppercase";
                }
                if(topGlow) topGlow.className = "absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-600 via-orange-500 to-yellow-500";
            }

            // URL में एक्सेस टोकन आने पर पासवर्ड बदलने वाला पैनल खोलें
            const { data: sessionData } = await supabaseClient.auth.getSession();
            if (window.location.hash.includes('access_token=') || sessionData?.session) {
                document.getElementById('request-container').classList.add('hidden');
                document.getElementById('reset-password-form').classList.remove('hidden');
            }
        };

        // RECOVERY LINK TRANSMITTER
        async function handleSupabaseRecoveryRequest() {
            let emailInput = document.getElementById('recovery-email').value.trim().toLowerCase();
            const sendBtn = document.getElementById('send-btn');
            const isRequestFromAdmin = window.location.search.includes('source=admin');

            if (!emailInput) { alert("Please supply your email configuration."); return; }

            sendBtn.innerText = "Transmitting recovery link...";
            sendBtn.disabled = true;

            // अगर यूजर ने पूरा ईमेल डाला है, तो उसे क्लीन करके सिर्फ यूजरनाम निकालें
            if (emailInput.includes('@')) {
                emailInput = emailInput.split('@')[0];
            }

            // कस्टमाइज्ड रूट के लिए पैरामीटर सेट करें
            const appendParam = isRequestFromAdmin ? "?source=admin" : "";

            try {
                // 🚀 फिक्स: यहाँ वेरिएबल 'email' को बदलकर 'emailInput' किया गया है
                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(emailInput + "@gmail.com", {
                    redirectTo: 'https://www.exam-portal-cse.online/forgot-password.html' + appendParam,
                });

                if (error) {
                    alert("Error: " + error.message);
                } else {
                    alert("Success: Verification link dispatched to core nodes. Check Inbox/Spam.");
                }
            } catch (err) {
                alert("Network pipeline execution error: " + err.message);
            } finally {
                sendBtn.innerText = "Send Recovery Link";
                sendBtn.disabled = false;
            }
        }

        // BACKEND OVERWRITE AND SYSTEM ARCHITECTURE SYNCHRONIZATION
        async function commitNewPasswordToSupabase() {
            const newPass = document.getElementById('new-password').value.trim();
            const commitBtn = document.getElementById('commit-btn');
            const isRequestFromAdmin = window.location.search.includes('source=admin');

            if (!newPass || newPass.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            commitBtn.innerText = "Synchronizing credentials safely...";
            commitBtn.disabled = true;

            try {
                const { data: authData, error: authError } = await supabaseClient.auth.updateUser({ password: newPass });

                if (authError) {
                    alert("Authentication Error: " + authError.message);
                    return;
                }

                let verifiedEmail = authData?.user?.email;

                if (verifiedEmail) {
                    if (verifiedEmail.includes('@')) {
                        verifiedEmail = verifiedEmail.split('@')[0];
                    }

                    const { error: dbError } = await supabaseClient
                        .from('portal_users')
                        .update({ password: newPass })
                        .eq('email', verifiedEmail);

                    if (dbError) console.log("Database update alert:", dbError.message);

                    const OFFICIAL_ADMIN_EMAIL = "examportalcse"; // बिना डोमेन का आईडी मैच
                    alert("Success! Password synchronized seamlessly across all system architecture nodes.");
                    
                    await supabaseClient.auth.signOut();
                    
                    if (verifiedEmail.toLowerCase() === OFFICIAL_ADMIN_EMAIL.toLowerCase() || isRequestFromAdmin) {
                        window.location.replace("admin-login.html");
                    } else {
                        window.location.replace("index.html");
                    }
                } else {
                    alert("Session timeout context validation missing.");
                    window.location.replace("index.html");
                }
            } catch (err) {
                alert("Core database synchronization fault.");
            } {
                commitBtn.innerText = "Update Account Credentials";
                commitBtn.disabled = false;
            }
        }

        function handleBackNavigation() {
            if (document.referrer.includes('admin-login.html') || window.location.search.includes('source=admin')) {
                window.location.href = "admin-login.html";
            } else {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
