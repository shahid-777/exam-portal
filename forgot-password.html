<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery - Google Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 🚀 Google Identity Services Client Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white max-w-md w-full p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-200 space-y-6 text-center">
        
        <!-- HEADER -->
        <div class="space-y-1.5">
            <h2 class="text-xl font-black text-slate-900 uppercase tracking-wide">Password Recovery</h2>
            <p class="text-xs text-slate-400 font-medium">Verify your identity using your official Google ID to reset your credentials.</p>
        </div>

        <hr class="border-slate-100">

        <!-- GOOGLE ID VERIFICATION TRIGGER BUTTON CONTAINER -->
        <div class="space-y-4 py-2">
            <div class="flex justify-center">
                <!-- Google Dynamic Render Engine targets this ID -->
                <div id="google-recovery-btn"></div>
            </div>
            
            <p id="status-message" class="text-xs font-semibold text-amber-600 hidden animate-pulse">
                Verifying authorization node with Google identity system...
            </p>
        </div>

        <hr class="border-slate-100">

        <!-- DYNAMIC MANUAL RESET PASSWORD FORM (Initially Hidden) -->
        <div id="reset-password-form" class="hidden text-left space-y-4 pt-2">
            <span class="block text-[11px] font-mono font-black text-emerald-600 uppercase tracking-wider bg-emerald-50 border border-emerald-100 p-2 rounded-xl text-center">
                ✓ Identity Verified Successfully
            </span>
            
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1.5">Enter New Secure Password</label>
                <input type="password" id="new-password" placeholder="••••••••" class="w-full border-2 p-3 text-sm rounded-xl font-semibold text-slate-800 outline-none focus:border-blue-500 border-slate-200 bg-slate-50">
            </div>

            <button onclick="commitNewPasswordToDatabase()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 px-4 rounded-xl shadow-md uppercase text-xs tracking-wider transition active:scale-95">
                Update Account Credentials
            </button>
        </div>

        <!-- FOOTER BACK LINK -->
        <div class="text-center pt-2">
            <a href="index.html" class="text-xs font-bold text-blue-600 hover:underline">Back to Login Terminal</a>
        </div>
    </div>

    <script>
        // 🌟 Initializing Google Client Identity parameters on load
        window.onload = function () {
            google.accounts.id.initialize({
                // 🔥 REPLACE with your real Google Cloud Console Client ID
                client_id: "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com", 
                callback: handleGoogleIdentityResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("google-recovery-btn"),
                { theme: "outline", size: "large", type: "standard", text: "continue_with" }
            );
        };

        // 🛡️ Callback after User completes Google Sign-In Window
        async function handleGoogleIdentityResponse(response) {
            const statusMsg = document.getElementById('status-message');
            statusMsg.classList.remove('hidden');

            try {
                // The credential token is a JWT containing verified user info
                const idToken = response.credential;
                
                // Parse the JWT payload safely to read the email match
                const base64Url = idToken.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                const googleUser = JSON.parse(jsonPayload);
                const verifiedEmail = googleUser.email;

                // 🚀 Cache verified email token context for password overwrite operation
                localStorage.setItem('recoveryTargetEmail', verifiedEmail);

                // Reveal Password Form and hide loading text
                statusMsg.classList.add('hidden');
                document.getElementById('google-recovery-btn').classList.add('hidden');
                document.getElementById('reset-password-form').classList.remove('hidden');

            } catch (error) {
                alert("Identity validation failed. Please check network protocols.");
                statusMsg.classList.add('hidden');
            }
        }

        // 💾 Final commit function to sync updated credentials
        async function commitNewPasswordToDatabase() {
            const newPass = document.getElementById('new-password').value.trim();
            const targetEmail = localStorage.getItem('recoveryTargetEmail');

            if (!newPass || newPass.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            if (!targetEmail) {
                alert("Identity verification session expired. Please authenticate via Google again.");
                window.location.reload();
                return;
            }

            // --- Supabase Connect Logic integration block ---
            // Yahan aap Supabase API initialize karke user authentication metadata update trigger karenge:
            // const { data, error } = await supabaseClient.from('portal_users').update({ password: newPass }).eq('email', targetEmail);
            
            alert(`Success! Credentials updated safely for account node.`);
            localStorage.removeItem('recoveryTargetEmail');
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
