<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery - Secure Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase Core Layer JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white max-w-md w-full p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-200 space-y-6 text-center">
        
        <!-- HEADER PANEL -->
        <div class="space-y-1.5">
            <h2 class="text-xl font-black text-slate-900 uppercase tracking-wide">Account Recovery</h2>
            <p class="text-xs text-slate-400 font-medium">Enter your registered security email to receive an official recovery link.</p>
        </div>

        <hr class="border-slate-100">

        <!-- STEP 1: EMAIL SUBMISSION FORM -->
        <div id="request-container" class="text-left space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1.5">Registered Email Address</label>
                <input type="email" id="recovery-email" placeholder="Enter your email address" autocomplete="off" class="w-full border-2 p-3 text-sm rounded-xl font-semibold text-slate-800 outline-none focus:border-blue-500 border-slate-200 bg-slate-50">
            </div>

            <button id="send-btn" onclick="handleSupabaseRecoveryRequest()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 px-4 rounded-xl shadow-md uppercase text-xs tracking-wider transition active:scale-95">
                Send Recovery Link
            </button>
        </div>

        <!-- STEP 2: PASSWORD RESET WORKSPACE -->
        <div id="reset-password-form" class="hidden text-left space-y-4 pt-2">
            <span class="block text-[10px] font-mono font-black text-emerald-600 uppercase tracking-wider bg-emerald-50 border border-emerald-100 p-2.5 rounded-xl text-center">
                ✓ Secure Reset Session Verified
            </span>
            
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1.5">Enter New Secure Password</label>
                <input type="password" id="new-password" placeholder="••••••••" class="w-full border-2 p-3 text-sm rounded-xl font-semibold text-slate-800 outline-none focus:border-blue-500 border-slate-200 bg-slate-50">
            </div>

            <button id="commit-btn" onclick="commitNewPasswordToSupabase()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-3.5 px-4 rounded-xl shadow-md uppercase text-xs tracking-wider transition active:scale-95">
                Update Account Credentials
            </button>
        </div>

        <div class="text-center pt-2">
            <a href="admin-login.html" class="text-xs font-bold text-blue-600 hover:underline">Back to Login Terminal</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        
        // 🚀 CRITICAL CONFIG: Added autoRefreshToken and persistSession explicitly for URL hashes
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });

        window.onload = async function() {
            // Let Supabase process the URL hash fragments natively first
            const { data: sessionData } = await supabaseClient.auth.getSession();
            
            // Check if URL contains tokens or if Supabase successfully established an active recovery session
            if (window.location.hash.includes('access_token=') || sessionData?.session) {
                document.getElementById('request-container').classList.add('hidden');
                document.getElementById('reset-password-form').classList.remove('hidden');
            }
        };

        async function handleSupabaseRecoveryRequest() {
            const emailInput = document.getElementById('recovery-email').value.trim();
            const sendBtn = document.getElementById('send-btn');

            if (!emailInput) { alert("Please supply your email."); return; }

            sendBtn.innerText = "Transmitting recovery link...";
            sendBtn.disabled = true;

            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(emailInput, {
                    redirectTo: window.location.origin + window.location.pathname, // Returns clean URL execution path
                });

                if (!error) {
                    alert("Success! Verification link dispatched. Please open your inbox or spam folder.");
                } else {
                    alert("Supabase Error: " + error.message);
                }
            } catch (err) {
                alert("Network pipeline synchronization fault.");
            } finally {
                sendBtn.innerText = "Send Recovery Link";
                sendBtn.disabled = false;
            }
        }

        // 🔐 HIGH-SECURITY ROLE-ISOLATED ROUTING ENGINE
async function commitNewPasswordToSupabase() {
    const newPass = document.getElementById('new-password').value.trim();
    const commitBtn = document.getElementById('commit-btn');

    if (!newPass || newPass.length < 6) {
        alert("Password must be at least 6 characters long.");
        return;
    }

    commitBtn.innerText = "Synchronizing credentials safely...";
    commitBtn.disabled = true;

    try {
        // Step 1: Update inside Supabase Auth system
        const { data: authData, error: authError } = await supabaseClient.auth.updateUser({ password: newPass });

        if (authError) {
            alert("Authentication System Error: " + authError.message);
            return;
        }

        const verifiedEmail = authData?.user?.email;

        if (verifiedEmail) {
            // Step 2: Overwrite plain-text inside 'portal_users' table
            const { error: dbError } = await supabaseClient
                .from('portal_users')
                .update({ password: newPass })
                .eq('email', verifiedEmail);

            if (dbError) {
                console.log("Database column update alert:", dbError.message);
            }

            // 🌟 INTELLECTUAL DIRECTION RESOLVER: Checks exact login source & email context
            const OFFICIAL_ADMIN_EMAIL = "shahid.gauri2@gmail.com";
            
            alert("Success! Password updated seamlessly across all clusters.");
            
            // Clear current auth tokens to force a fresh secure login session
            await supabaseClient.auth.signOut();
            
            // Checking logic to see where the user initiated the forgot request
            const isRequestFromAdminGateway = document.referrer.includes('admin-login.html') || window.location.search.includes('source=admin');

            if (verifiedEmail.toLowerCase() === OFFICIAL_ADMIN_EMAIL.toLowerCase() || isRequestFromAdminGateway) {
                // Route explicitly locked for Root Admin Console Gateway
                window.location.replace("admin-login.html");
            } else {
                // Route locked for Student/User Front Entrance
                window.location.replace("index.html");
            }
        } else {
            alert("Session timeout context exception. Returning to main portal.");
            window.location.replace("index.html");
        }

    } catch (err) {
        alert("Core network synchronization fault.");
    } finally {
        commitBtn.innerText = "Update Account Credentials";
        commitBtn.disabled = false;
    }
}


    </script>
</body>
</html>
