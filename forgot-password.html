<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery - Secure Google Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white max-w-md w-full p-6 sm:p-8 rounded-2xl shadow-xl border border-slate-200 space-y-6 text-center">
        
        <div class="space-y-1.5">
            <h2 class="text-xl font-black text-slate-900 uppercase tracking-wide">Admin / User Recovery</h2>
            <p class="text-xs text-slate-400 font-medium">Verify your official Google identity to unlock password overwrite panel.</p>
        </div>

        <hr class="border-slate-100">

        <div class="space-y-4 py-2">
            <div class="flex justify-center">
                <div id="google-recovery-btn"></div>
            </div>
            <p id="status-message" class="text-xs font-semibold text-amber-600 hidden animate-pulse">
                Verifying authorization signature with Google database...
            </p>
        </div>

        <hr class="border-slate-100">

        <div id="reset-password-form" class="hidden text-left space-y-4 pt-2">
            <span id="identity-badge" class="block text-[10px] font-mono font-black text-emerald-600 uppercase tracking-wider bg-emerald-50 border border-emerald-100 p-2.5 rounded-xl text-center truncate">
                ✓ Identity Verified
            </span>
            
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1.5">Enter New Secure Password</label>
                <input type="password" id="new-password" placeholder="••••••••" class="w-full border-2 p-3 text-sm rounded-xl font-semibold text-slate-800 outline-none focus:border-blue-500 border-slate-200 bg-slate-50">
            </div>

            <button id="commit-btn" onclick="commitNewPasswordToSupabase()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 px-4 rounded-xl shadow-md uppercase text-xs tracking-wider transition active:scale-95">
                Update Password
            </button>
        </div>

        <div class="text-center pt-2">
            <a href="index.html" class="text-xs font-bold text-blue-600 hover:underline">Back to Login Terminal</a>
        </div>
    </div>

    <script>
        // 🚀 DATABASE CREDENTIALS NODE CONNECTION
        const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = function () {
            google.accounts.id.initialize({
                // 🔥 PASTE YOUR EXISTING CLIENT ID HERE:
                client_id: "733002244095-gira3i932o1579gse968oetc9t08o8gi.apps.googleusercontent.com.apps.googleusercontent.com", 
                callback: handleGoogleRecoveryResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("google-recovery-btn"),
                { theme: "outline", size: "large", type: "standard", text: "continue_with" }
            );
        };

        async function handleGoogleRecoveryResponse(response) {
            const statusMsg = document.getElementById('status-message');
            statusMsg.classList.remove('hidden');

            try {
                // JWT Token unpacking architecture
                const idToken = response.credential;
                const base64Url = idToken.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                const googleUser = JSON.parse(jsonPayload);
                const verifiedEmail = googleUser.email;

                // Lock core verification state session memory
                localStorage.setItem('recoveryTargetEmail', verifiedEmail);
                document.getElementById('identity-badge').innerText = `✓ Verified: ${verifiedEmail}`;

                statusMsg.classList.add('hidden');
                document.getElementById('google-recovery-btn').classList.add('hidden');
                document.getElementById('reset-password-form').classList.remove('hidden');

            } catch (error) {
                alert("Google verification session mismatch.");
                statusMsg.classList.add('hidden');
            }
        }

        // 💾 DIRECT SUPABASE DATABASE WRITER OVERWRITE SEQUENCE
        async function commitNewPasswordToSupabase() {
            const newPass = document.getElementById('new-password').value.trim();
            const targetEmail = localStorage.getItem('recoveryTargetEmail');
            const commitBtn = document.getElementById('commit-btn');

            if (!newPass || newPass.length < 4) {
                alert("Password must be secure and at least 4 characters long.");
                return;
            }

            if (!targetEmail) {
                alert("Session context missing. Please verify with Google again.");
                window.location.reload();
                return;
            }

            commitBtn.innerText = "Overwriting encrypted keys...";
            commitBtn.disabled = true;

            try {
                // 🔄 Updates the exact matching email row in your schema table
                const { error } = await supabaseClient
                    .from('portal_users')
                    .update({ password: newPass })
                    .eq('email', targetEmail);

                if (!error) {
                    alert("Success! Password overwritten flawless across system nodes.");
                    localStorage.removeItem('recoveryTargetEmail');
                    window.location.replace("index.html");
                } else {
                    alert("Database mapping fault: " + error.message);
                }
            } catch (err) {
                alert("Network pipeline execution error.");
            } finally {
                commitBtn.innerText = "Update Password";
                commitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
