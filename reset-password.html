<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Overwrite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen font-sans px-4">
    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-red-900/50">
        <h1 class="text-xl font-black text-red-500 mb-2 text-center uppercase tracking-wider">SECURE ACCOUNT RECOVERY</h1>
        <p id="target-display" class="text-gray-400 mb-6 text-xs text-center font-mono text-yellow-500">System Ready for Token Verification Parameters.</p>
        
        <form id="secure-verification-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wider">Enter OTP Token / Magic Code from Email</label>
                <input type="text" id="email-token" required placeholder="Paste token code here" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-red-500 font-mono text-white mb-3">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wider">Type New Secure Password</label>
                <input type="password" id="admin-fresh-pass" required placeholder="Minimum 6 characters" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-red-500 font-mono text-white">
            </div>
            <button type="submit" id="final-btn" class="w-full bg-red-700 text-white font-bold py-3 rounded-xl uppercase text-xs tracking-widest hover:bg-red-600 transition shadow-lg shadow-red-950">
                Verify Email & Save Password
            </button>
        </form>
    </div>

    <script>
        // ⚠️ APNI ASLI SUPABASE CREDENTIALS UPDATE KAREIN
       const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fetch target email falling back to fallback arrays safely
        let targetEmail = localStorage.getItem('adminResetEmail');

        window.onload = function() {
            // No alerting checks here! Only text updates to keep page safe from loops
            if (!targetEmail) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                if(hashParams.has('email')) {
                    targetEmail = hashParams.get('email');
                    localStorage.setItem('adminResetEmail', targetEmail);
                }
            }

            if (targetEmail) {
                document.getElementById('target-display').innerText = `Target Account: ${targetEmail}`;
                document.getElementById('target-display').classList.remove('text-yellow-500');
                document.getElementById('target-display').classList.add('text-gray-400');
            } else {
                document.getElementById('target-display').innerText = "Notice: Processing session active. Please request token from Admin Gateway.";
            }
        };

        document.getElementById('secure-verification-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const token = document.getElementById('email-token').value.trim();
            const newPass = document.getElementById('admin-fresh-pass').value;
            const btn = document.getElementById('final-btn');
            
            const currentEmail = localStorage.getItem('adminResetEmail');
            if(!currentEmail) {
                alert("Security Authorization Error: No target admin profile found in storage registry. Please use the 'admin-login.html' screen first.");
                window.location.href = "admin-login.html";
                return;
            }

            if(newPass.length < 6) { 
                alert("Baseline Error: Password must be 6+ chars."); 
                return; 
            }
            
            btn.innerText = "Verifying Token with Server..."; 
            btn.disabled = true;
            
            try {
                // Phase 1: Verify token via OTP framework
                const { error: verifyError } = await supabaseClient.auth.verifyOtp({
                    email: currentEmail,
                    token: token,
                    type: 'magiclink'
                });

                if (verifyError) {
                    alert("Security Block: Invalid or expired email verification token code!");
                    btn.innerText = "Verify Email & Save Password"; btn.disabled = false;
                    return;
                }

                // Phase 2: Token is valid -> Update table registry
                const { error: dbError } = await supabaseClient
                    .from('portal_users')
                    .update({ password: newPass })
                    .eq('email', currentEmail);

                if (dbError) {
                    alert("Database Sync Failed: " + dbError.message);
                    btn.innerText = "Verify Email & Save Password"; btn.disabled = false;
                    return;
                }

                alert("Verification Perfect: Password successfully updated via email token authorization!");
                localStorage.removeItem('adminResetEmail');
                window.location.href = "admin-login.html";

            } catch (err) { 
                alert("Engine processing failure."); 
                btn.innerText = "Verify Email & Save Password"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
