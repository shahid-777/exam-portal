<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 📥 BROWSER TAB LOGO (FAVICON) CODELINE -->
    <link rel="icon" type="image/png" href="logo.png">
    <title>Master Overwrite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen font-sans px-4">
    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-red-900/50">
        <h1 class="text-xl font-black text-red-500 mb-2 text-center uppercase tracking-wider">SECURE ACCOUNT RECOVERY</h1>
        <p id="target-display" class="text-gray-400 mb-6 text-xs text-center font-mono text-yellow-500">System Ready for Master Pin Verification Parameters.</p>
        
        <form id="secure-verification-form" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wider">Enter Admin Secret Security PIN</label>
                <input type="password" id="secret-pin" required placeholder="Type Your Secret Recovery Key" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-red-500 font-mono text-white mb-3">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wider">Type New Master Password</label>
                <input type="password" id="admin-fresh-pass" required placeholder="Minimum 6 characters" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-red-500 font-mono text-white">
            </div>
            <button type="submit" id="final-btn" class="w-full bg-red-700 text-white font-bold py-3 rounded-xl uppercase text-xs tracking-widest hover:bg-red-600 transition shadow-lg shadow-red-950">
                Verify Secure PIN & Save Password
            </button>
        </form>
    </div>

    <script>
    // Real Supabase Credentials
    const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG"; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let targetEmail = localStorage.getItem('adminResetEmail');

    window.onload = function() {
        if (targetEmail) {
            document.getElementById('target-display').innerText = `Target Account: ${targetEmail}`;
        } else {
            document.getElementById('target-display').innerText = "Notice: No active session token found.";
        }
    };

    document.getElementById('secure-verification-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const enteredPin = document.getElementById('secret-pin').value.trim();
        const newPass = document.getElementById('admin-fresh-pass').value;
        const btn = document.getElementById('final-btn');
        
        const currentEmail = localStorage.getItem('adminResetEmail');
        if(!currentEmail) {
            alert("Security Authorization Error: No session token mapped.");
            window.location.href = "admin-login.html"; return;
        }

        if(newPass.length < 6) { alert("Error: Password must be 6+ chars."); return; }
        
        btn.innerText = "Verifying via Secure Database Node..."; 
        btn.disabled = true;
        
        try {
            // 🔒 CALLING DATABASE RPC: Ab browser data access nahi kar raha, sirf query bhej raha hai
            const { data: isPinValid, error: rpcError } = await supabaseClient
                .rpc('verify_admin_pin', { entered_pin: enteredPin });

            if (rpcError) {
                alert("Security System Error: Secure handshake failed.");
                resetForm(); return;
            }

            // Database ne false lautaya toh access denied
            if (!isPinValid) {
                alert("Access Denied: The Security PIN is incorrect.");
                resetForm(); return;
            }
            
            // Agar PIN sahi hai, toh password update karein
            const { error: dbError } = await supabaseClient
                .from('portal_users')
                .update({ password: newPass })
                .eq('email', currentEmail);

            if (dbError) {
                alert("Database Sync Failed: " + dbError.message);
                resetForm(); return;
            }

            alert("Success! Master password updated securely.");
            
            // 🛡️ SESSION FLUSH: LocalStorage ko clear karna zaroori hai taaki data leak na ho
            localStorage.removeItem('adminResetEmail');
            
            window.location.href = "admin-login.html";

        } catch (err) { 
            alert("Engine processing failure."); 
            resetForm();
        }

        function resetForm() {
            btn.innerText = "Verify Secure PIN & Save Password";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
