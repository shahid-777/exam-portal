<!-- reset-password.html ko completely is clear template se overwrite kar dein -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Overwrite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen font-sans px-4">
    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-red-900/50">
        <h1 class="text-xl font-black text-red-500 mb-6 text-center uppercase tracking-wider">OVERWRITE MASTER CREDENTIALS</h1>
        <form id="final-reset-form" class="space-y-4">
            <input type="password" id="admin-fresh-pass" required placeholder="Enter New Master Password" class="w-full bg-slate-800 border p-3 rounded-xl text-sm outline-none focus:border-red-500 font-mono">
            <button type="submit" id="final-btn" class="w-full bg-red-700 text-white font-bold py-3 rounded-xl uppercase text-xs tracking-widest hover:bg-red-600 transition">Save Matrix Credentials</button>
        </form>
    </div>
    <script>
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('final-reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPass = document.getElementById('admin-fresh-pass').value;
            const btn = document.getElementById('final-btn');
            if(newPass.length < 6) { alert("Must be 6+ characters."); return; }
            
            btn.innerText = "Synchronizing Cluster..."; btn.disabled = true;
            
            const { data: sessionData } = await supabaseClient.auth.getSession();
            const currentEmail = sessionData?.session?.user?.email;

            const { error } = await supabaseClient.auth.updateUser({ password: newPass });
            if(!error) {
                if(currentEmail) {
                    await supabaseClient.from('portal_users').update({ password: newPass }).eq('email', currentEmail);
                }
                alert("Master Update Successful! Redirecting to security login...");
                window.location.href = "admin-login.html";
            } else { alert("Failed: " + error.message); btn.innerText = "Save Matrix Credentials"; btn.disabled = false; }
        });
    </script>
</body>
</html>
