
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Security Credentials - Exam Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen font-sans px-4">

    <div class="bg-gray-800 p-6 sm:p-10 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-black text-blue-500 mb-2 tracking-wide text-center uppercase">RESET PASSWORD</h1>
        <p class="text-gray-400 mb-6 text-xs sm:text-sm text-center">Establish a new secure access key for your account matrix.</p>
        
        <form id="reset-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1 tracking-wider">Type New Password</label>
                <input type="password" id="new-password" required placeholder="••••••••" class="w-full bg-gray-700 border border-gray-600 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-blue-500 font-semibold">
            </div>
            
            <button type="submit" id="reset-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-3.5 px-4 rounded-xl transition duration-300 shadow-md uppercase text-xs sm:text-sm tracking-wider">
                Update Security Password
            </button>
        </form>
    </div>

    <script>
        // ⚠️ APNI ASLI SUPABASE CREDENTIALS YAHAN BHI PASTE KAREIN
       const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('new-password').value;
            const resetBtn = document.getElementById('reset-btn');

            if(newPassword.length < 6) {
                alert("Security Constraint: Password length must be at least 6 characters.");
                return;
            }

            resetBtn.innerText = "Updating Credentials...";
            resetBtn.disabled = true;

            try {
                // Updates user password in Supabase Auth system securely
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if(!error) {
                    alert("Success: Your account password has been updated flawlessly! Redirecting to login terminal...");
                    window.location.href = "index.html";
                } else {
                    alert("Gateway Exception: " + error.message);
                    resetBtn.innerText = "Update Security Password";
                    resetBtn.disabled = false;
                }
            } catch(err) {
                alert("Critical engine transmission error.");
                resetBtn.innerText = "Update Security Password";
                resetBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
