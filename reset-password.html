<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Change</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen font-sans px-4">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-black text-blue-500 mb-6 text-center uppercase">Change Password</h1>
        
        <form id="change-pass-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Current Password</label>
                <input type="password" id="old-password" required class="w-full bg-gray-700 border border-gray-600 rounded-xl p-3 text-sm focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">New Password</label>
                <input type="password" id="new-password" required class="w-full bg-gray-700 border border-gray-600 rounded-xl p-3 text-sm focus:border-blue-500 outline-none">
            </div>
            
            <button type="submit" id="update-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 rounded-xl uppercase text-sm">
                Update Password
            </button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('change-pass-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = localStorage.getItem('userEmail');
            const oldPass = document.getElementById('old-password').value;
            const newPass = document.getElementById('new-password').value;
            const btn = document.getElementById('update-btn');

            if(!email) { alert("Session expired. Please login again."); window.location.href = "index.html"; return; }

            btn.innerText = "Verifying...";
            
            // 1. Check if current password is correct
            const { data, error: signInError } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: oldPass
            });

            if(signInError) {
                alert("Incorrect current password!");
                btn.innerText = "Update Password";
                return;
            }

            // 2. Update to new password
            const { error: updateError } = await supabaseClient.auth.updateUser({ password: newPass });

            if(!updateError) {
                // 3. Update in our custom 'portal_users' table too
                await supabaseClient.from('portal_users').update({ password: newPass }).eq('email', email);
                alert("Password updated successfully!");
                window.location.href = "dashboard.html";
            } else {
                alert("Error: " + updateError.message);
                btn.innerText = "Update Password";
            }
        });
    </script>
</body>
</html>
