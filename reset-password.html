<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen font-sans px-4">

    <div class="bg-gray-800 p-6 sm:p-10 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-black text-blue-500 mb-2 text-center uppercase tracking-wide">RESET PASSWORD</h1>
        <p id="reset-identity-desc" class="text-gray-400 mb-6 text-xs sm:text-sm text-center font-medium">Verifying authorization profile link...</p>
        
        <form id="direct-overwrite-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1 tracking-wider">Type New Secure Password</label>
                <input type="password" id="fresh-password" required placeholder="Minimum 6 characters" class="w-full bg-gray-700 border border-gray-600 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-blue-500 font-semibold">
            </div>
            
            <button type="submit" id="overwrite-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-3.5 px-4 rounded-xl transition duration-300 shadow-md uppercase text-xs sm:text-sm tracking-wider">
                Confirm & Update Password
            </button>
        </form>
    </div>

    <script>
        // ⚠️ APNI REAL CREDENTIALS YAHAN PASTE KAREIN
       const SUPABASE_URL = "https://lelvinusfxniqrmfufql.supabase.co";
        const SUPABASE_KEY = "sb_publishable_jQSp32AKdo2vkHFvNHbLWg_pEq8TBRG";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fetching structural routing parameters from local registers
        const targetEmail = localStorage.getItem('resetTargetEmail');
        
        window.onload = function() {
            if(!targetEmail) {
                alert("Security Warning: Unauthorized route access detected. Redirecting to terminal initialization map.");
                window.location.href = "index.html";
                return;
            }
            document.getElementById('reset-identity-desc').innerText = `Account Target: ${targetEmail}`;
        };

        document.getElementById('direct-overwrite-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('fresh-password').value;
            const actionBtn = document.getElementById('overwrite-btn');

            if(newPassword.length < 6) {
                alert("Validation Exception: Security baseline requires at least 6 characters.");
                return;
            }

            actionBtn.innerText = "Synchronizing Database Matrix...";
            actionBtn.disabled = true;

            try {
                // Step 1: Explicit Table Overwrite inside portal_users
                const { error: dbError } = await supabaseClient
                    .from('portal_users')
                    .update({ password: newPassword })
                    .eq('email', targetEmail);

                if (dbError) {
                    alert("Sync Aborted: " + dbError.message);
                    resetActionBtn();
                    return;
                }

                // Step 2: Informational confirmation logic
                alert(`Flawless Sync! Password for ${targetEmail} has been overwritten successfully. redirecting to main login...`);
                localStorage.clear(); // Safe clean
                window.location.href = "index.html";

            } catch (err) {
                alert("Critical transmission cluster exception.");
                resetActionBtn();
            }

            function resetActionBtn() {
                actionBtn.innerText = "Confirm & Update Password";
                actionBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
