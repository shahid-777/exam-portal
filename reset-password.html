<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Overwrite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen font-sans px-4">
    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-red-900/50">
        <h1 class="text-xl font-black text-red-500 mb-2 text-center uppercase tracking-wider">OVERWRITE MASTER CREDENTIALS</h1>
        <p id="target-display" class="text-gray-400 mb-6 text-xs text-center font-mono">Verifying administrative targets...</p>
        
        <form id="final-reset-form" class="space-y-4">
            <input type="password" id="admin-fresh-pass" required placeholder="Enter New Master Password (6+ chars)" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-red-500 font-mono text-white">
            <button type="submit" id="final-btn" class="w-full bg-red-700 text-white font-bold py-3 rounded-xl uppercase text-xs tracking-widest hover:bg-red-600 transition shadow-lg shadow-red-950">
                Save Matrix Credentials
            </button>
        </form>
    </div>

    <script>
        // ⚠️ APNI REAL SUPABASE CREDENTIALS YAHAN BHI DIRECT UPDATE KAREIN
        const SUPABASE_URL = "YOUR_SUPABASE_PROJECT_URL";
        const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fetch target email from localStorage fallback architecture
        const targetEmail = localStorage.getItem('adminResetEmail');

        window.onload = function() {
            if (targetEmail) {
                document.getElementById('target-display').innerText = `Target Account: ${targetEmail}`;
            } else {
                document.getElementById('target-display').innerText = "System running via direct token verification parameters.";
            }
        };

        document.getElementById('final-reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPass = document.getElementById('admin-fresh-pass').value;
            const btn = document.getElementById('final-btn');
            
            if(newPass.length < 6) { 
                alert("Security Baseline: Password must be at least 6 characters."); 
                return; 
            }
            
            btn.innerText = "Synchronizing Cluster..."; 
            btn.disabled = true;
            
            try {
                // Phase 1: Supabase Authentication password update pipeline
                const { error: authError } = await supabaseClient.auth.updateUser({ password: newPass });
                
                if (authError) {
                    alert("Auth Update Failed: " + authError.message);
                    resetButton();
                    return;
                }

                // Phase 2: Update in our local explicit portal_users table using targetEmail register
                if (targetEmail) {
                    const { error: dbError } = await supabaseClient
                        .from('portal_users')
                        .update({ password: newPass })
                        .eq('email', targetEmail);

                    if (dbError) {
                        console.log("Database mirror sync skipped: " + dbError.message);
                    }
                }

                // Phase 3: Successful alert deployment and hard routing back to admin-login
                alert("Success: Master administrative credentials changed flawlessly! Redirecting to secure admin login screen...");
                localStorage.removeItem('adminResetEmail'); // Clear specific target session memory
                window.location.href = "admin-login.html";

            } catch (err) { 
                alert("Critical engine transmission error."); 
                resetButton();
            }

            function resetButton() {
                btn.innerText = "Save Matrix Credentials";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
